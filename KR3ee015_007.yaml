body:
  text: 卷七頭部主病針灸要穴歌百會主治卒中風兼治癲癇兒病驚大腸下氣脫肛病提補諸陽氣上升注百會穴提補陽氣上升主治大人中風痰火癲癇小兒急慢驚風大腸下氣脫肛等證針二分灸五壯神庭主灸羊癇風目眩頭痛灸腦空翳風專刺耳聾病兼刺瘰癧項下生注神庭穴主治風癇羊癲灸三壯禁針刺腦空穴主治偏正頭疼目眩刺四分灸五壯翳風穴主治耳聾及瘰癧針經云先將銅錢約二十文令患者咬之尋取穴中針三分禁灸上星通天主鼻淵瘜肉痔塞灸能痊兼治頭風目諸疾炷如小麥灼相安注上星通天二穴主治鼻淵鼻塞瘜肉鼻痔左鼻灸右右鼻灸左左右鼻俱病者左右俱灸灸後鼻中當去一塊形如朽骨狀其病自愈兼治頭風目疾等證也上星穴宜刺三分留六呼灸五壯一云宜三稜針出血以瀉諸陽之熱氣通天穴宜刺三分留七呼灸三壯其壯如小麥大始相宜也啞門風府只宜刺中風舌緩不能言頸項強急及瘈瘲頭風百病與傷寒注啞門風府二穴主治中風舌緩暴喑不語傷風傷寒頭痛項急不得回顧及抽搐等病啞門穴針二分不可深入禁灸風府穴針三分留三呼禁灸頭維主刺頭風疼目痛如脫淚不明禁灸隨皮三分刺兼刺攢竹更有功注頭維攢竹二穴主治頭風疼痛如破目痛如脫淚出不明頭維穴隨皮針三分禁灸攢竹穴刺一分留六呼禁灸隨皮者針入即眠針隨皮刺去也率谷酒傷吐痰眩風池主治肺中寒兼治偏正頭疼痛頰車落頰風自痊注率谷穴主治傷酒嘔吐痰眩刺三分灸三壯風池穴治肺受風寒及偏正頭風刺四分灸三壯七壯炷宜小頰車穴治落頰風落頰風者下頦脫落也刺三分灸三壯炷如小麥臨泣主治鼻不通眵䁾冷淚雲翳生驚癇反視卒暴厥目晡發瘧脅下疼注臨泣穴主治鼻塞目眩生翳眵䁾眼目諸疾及驚癇反視卒暴痰厥瘧疾晚發等病刺三分留七呼禁灸水溝中風口不開中惡癲癇口眼歪刺治風水頭面腫灸治兒風急慢災注水溝穴主治中風口噤牙關不開卒中惡邪鬼擊不省人事癲癇卒倒口眼歪邪風水面腫及小兒急慢驚風等病刺三分留六呼灸三壯至七壯炷如小麥然灸不及針承漿主治男七疝女子瘕聚兒緊唇偏風不遂刺之效消渴牙疳灸功深注承漿穴主治男子諸疝女子瘕聚小兒撮口及偏風半身不遂口眼喎邪口噤不開消渴飲水不休口齒疳蝕生瘡等證刺二分留五呼灸三壯迎香主刺鼻失臭兼刺面癢若蟲行先補後瀉三分刺此穴須知禁火攻注迎香穴主治鼻塞不聞香臭浮腫風動面癢狀如蟲行等證針三分禁灸口眼歪邪灸地倉頰腫唇弛牙噤強失音不語目不閉瞤動視物目䀮䀮注地倉穴主偏風口眼歪邪牙關不開齒痛頰腫目不能閉唇緩不收飲食難進失音不語眼目瞤動視物䀮䀮昏夜無見等證刺三分留五呼灸七壯或二七壯重者七七壯俱可聽會主治耳聾鳴兼刺迎香功最靈中風瘈瘲喎斜病牙車脫臼齒根疼注聽會穴主治耳聾耳鳴牙車脫臼齒痛中風瘈瘲喎邪等證針四分灸三壯兼瀉迎香功效如神迎香穴針三分禁灸聽宮主治耳聾鳴睛明攢竹目昏蒙迎風流淚眥癢痛雀目攀睛白翳生注聽宮穴主治耳內蟬鳴耳聾刺三分灸三壯睛明攢竹二穴主治目痛視不明迎風淚胬肉攀睛白翳眥癢雀目諸證睛明穴針分半留六呼禁灸攢竹穴治證同前刺三分留六呼禁灸胸腹部主病針灸要穴歌膻中穴主灸肺癰咳嗽哮喘及氣癭巨闕九種心疼病痰飲吐水息賁寧注膻中穴主治哮喘肺癰咳嗽氣癭等證灸七壯禁針巨闕穴主治九種心痛痰飲吐水腹痛息賁等證針三分留七呼灸七壯上脘奔豚與伏梁中脘主治脾胃傷兼治脾痛瘧痰暈痞滿翻胃盡安康注上脘穴主治腎積奔豚心積伏梁之證針八分留七呼灸五壯千金云每日灸二七壯至百壯孕婦不可灸中脘穴主治內傷脾胃心脾痛瘧疾痰暈痞滿翻胃等證針八分灸七壯一云二七壯至百壯孕子不可灸水分脹滿臍突硬水道不利灸之良神闕百病老虛瀉産脹溲難兒脫肛注水分穴主治鼓脹堅硬肚臍突出小便不利灸五壯禁針孕婦不可灸神闕穴主治百病及老人虛人泄瀉又治産後腹脹小便不通小兒脫肛等證灸三壯禁針一法納炒乾淨鹽填滿臍上加厚薑一片蓋定上加艾炷灸百壯或以川椒代鹽亦妙氣海主治臍下氣關元諸虛瀉濁遺中極下元虛寒病一切痼冷總皆宜注氣海穴主治一切氣疾陰證痼冷及風寒暑溫水腫心腹鼓脹諸虛癥瘕等證針八分灸五壯關元穴主治諸虛腎積及虛老人泄瀉遺精白濁等證針八分留七呼灸七壯千金云婦人針之則無子中極穴主治下元寒冷虛損及婦人月事不調赤白帶下針八分留十呼灸三壯孕婦不可灸膺腫乳癰灸乳根小兒龜胸灸亦同嘔吐吞酸灸日月大赫專治病遺精注乳根穴主治胸前腫乳癰小兒龜胸等證針三分灸三壯日月穴主治嘔吐吞酸針七分灸五壯大赫穴主治遺精針三分灸五壯天樞主灸脾胃傷脾瀉痢疾甚相當兼灸鼓脹癥瘕病艾火多加病必康注天樞穴主治內傷脾胃赤白痢疾脾瀉及臍腹鼓脹癥瘕等證針五分留七呼灸五壯千金云魂魄之舍不可針孕婦不可灸章門主治痞塊病但灸左邊可拔根若灸腎積臍下氣兩邊齊灸自然平注章門穴主治痞塊多灸左邊腎積灸兩邊針六分留六呼灸三壯一云百壯期門主治奔豚病上氣咳逆胸背疼兼治傷寒脅硬痛熱入血室刺有功注期門穴主治奔豚上氣咳逆胸滿胸背徹痛胸痛腹硬及傷寒熱入血室針四分灸五壯帶脈主灸一切疝偏墜木腎盡成功兼灸婦人濁帶下丹田溫暖自然停注帶脈穴主治疝氣偏墜木腎及婦人赤白帶下等證針六分灸五壯背部主病針灸要穴歌腰俞主治腰脊痛冷痹強急動作難腰下至足不仁冷婦人經病尿赤痊注腰俞穴主治腰脊重痛舉動不得俯仰艱難腰以下至足冷痹不仁及婦人經閉尿血等證刺二分留七呼灸五壯至陽專灸黃疸病兼灸痞滿喘促聲命門老虛腰痛證更治脫肛痔腸風注至陽穴主治身面俱黃胸脅支滿喘促不寧針五分灸三壯命門穴主治老人腎虛腰疼及久痔脫肛腸風下血等證針五分灸三壯若年二十以上者不宜灸灸恐絶子膏肓一穴灸勞傷百損諸虛無不良此穴禁針惟宜艾千金百壯效非常注膏肓穴主治諸虛百損五勞七傷身形羸瘦夢遺失精上氣咳逆痰火發狂健忘怔忡胎前産後勞瘵傳尸等證灸七七壯至百壯大杼主刺身發熱兼刺瘧疾咳嗽痰神道惟灸背上病怯怯短氣艾火添注大杼穴主治遍身發熱瘧疾咳嗽多痰針五分禁灸神道穴主治背上冷痛怯怯短氣灸七壯禁針風門主治易感風風寒痰嗽吐血紅兼治一切鼻中病艾火多加嗅自通注風門穴主治腠理不密易感風寒咳嗽吐痰咯血鼻衄及一切鼻中諸病針三分灸五壯肺俞內傷嗽吐紅兼灸肺痿與肺癰小兒龜背亦堪灸肺氣舒通背自平注肺俞穴主治內傷外感咳嗽吐血肺痿肺癰小兒龜背針三分留七呼灸三壯膈俞主治胸脅痛兼灸痰瘧痃癖攻更治一切失血證多加艾灼總收功注膈俞穴主治胸脅疼痛痰瘧痃癖一切血痰灸三壯禁針肝俞主灸積聚痛兼灸氣短語聲輕更同命門一併灸能使瞽目復重明注肝俞穴主治左脅積聚疼痛氣短不語若同命門穴一併灸之即兩目昏暗者可使復明肝俞穴灸七壯禁針命門穴針五分灸三壯膽俞主灸脅滿嘔驚悸臥睡不能安兼灸酒疸目黃色面發赤斑灸自痊注膽俞穴主治兩脅脹滿乾嘔驚悸睡臥不安及酒疸目睛發黃面發赤斑等證灸三壯禁針脾俞主灸傷脾胃吐瀉瘧痢疸瘕癥喘急吐血諸般證更治嬰兒慢脾風注脾俞穴主治內傷脾胃吐瀉瘧痢黃疸食積癥瘕吐血喘急及小兒慢脾風證灸五壯禁針三焦俞治脹滿疼積塊堅硬痛不寧更治赤白休息痢刺灸此穴自然輕注三焦俞穴主治脹滿積塊堅硬疼痛及赤白痢疾不止等證針二分灸五壯胃俞主治黃疸病食畢頭目即暈眩瘧疾善飢不能食艾火多加自可痊注胃俞穴主治黃疸食畢頭眩瘧疾善飢不能食等證針三分灸三壯腎俞主灸下元虛令人有子效多奇兼灸吐血聾腰痛女疸婦帶不能遺注腎俞穴主治下元諸虛精冷無子及耳聾吐血腰痛女勞疸婦人赤白帶下等證灸三壯禁針大腸俞治腰脊疼大小便難此可通兼治泄瀉痢疾病先補後瀉要分明注大腸俞穴主治腰脊疼痛大小便不通及泄瀉痢疾等證針三分灸三壯膀胱俞治小便難少腹脹痛不能安更治腰脊強直痛艾火多添疾自痊注膀胱俞穴主治小便不通少腹脹痛及腰脊強直疼痛等證針三分灸七壯譩嘻主治久瘧病五臟瘧灸臟俞平意舍主治脅滿痛兼療嘔吐立時寧注譩嘻俞穴主治久瘧若五臟瘧灸五臟俞五臟俞者心肝脾肺腎俞也俱針六分灸二七壯意舍穴主治兩脅脹滿疼痛嘔吐針五分灸三壯身柱主治羊癇風咳嗽痰喘腰背疼長強惟治諸般痔百勞穴灸汗津津注身柱穴主治風癇發狂咳嗽痰喘腰背疼痛等證針五分灸七七壯長強穴主治諸般痔漏疼痛針三分灸三十壯百勞穴主治滿身發熱虛汗盜汗津津不止針五分留三呼瀉五吸灸以年為壯手部主病針灸要穴歌尺澤主刺肺諸疾絞腸痧痛鎖喉風傷寒熱病汗不解兼刺小兒急慢風注尺澤穴主治咳唾膿血喉痹肺積息賁及絞腸痧痛傷寒汗不出小兒急慢驚風等證刺三分或三稜針出血禁灸列缺主治嗽寒痰偏正頭疼治自痊男子五淋陰中痛尿血精出灸便安注列缺穴主治咳嗽寒痰偏正頭疼及男子淋漓陰中疼痛尿血精出等證針二分灸七壯炷如小麥經渠主刺瘧寒熱胸背拘急脹滿堅喉痹咳逆氣數欠嘔吐心疼亦可痊注經渠穴主治咳瘧寒熱胸背拘急膨脹喉痹咳逆上氣數欠嘔吐心疼等證針二分禁灸太淵主刺牙齒病腕肘無力或痛疼兼刺咳嗽風痰疾偏正頭疼效若神注太淵穴主治牙齒疼痛手腕無力疼痛及咳嗽風痰偏正頭疼等證針二分灸三壯魚際主灸牙齒痛在左灸左右同然更刺傷寒汗不出兼治瘧疾方欲寒注魚際穴主治牙齒痛瘧疾初起先覺發寒傷寒汗不出等證針二分惟牙痛可灸餘證禁灸少衝主治心膽虛怔忡癲狂不可遺少商惟針雙鵝痹血出喉開功最奇注少衝穴主治心虛膽寒怔忡癲狂針一分灸三壯少商穴主治雙鵝風喉痹以三稜針刺微出血禁灸少海主刺腋下瘰漏臂痹痛羊癇風靈道主治心疼痛瘈瘲暴喑不出聲注少海穴主治腋下瘰癧漏臂與風吹肘臂疼痛也及癲癇羊鳴等證針五分禁灸靈道穴主治心痛羊癇瘈瘲肘攣暴喑不能言等證針三分灸三壯通里主治溫熱病無汗懊憹心悸驚喉痹苦嘔暴喑啞婦人經漏過多崩注通里穴主治溫病面熱無汗懊憹心悸驚恐喉痹苦嘔暴喑聲啞及婦人經血過多崩漏等證針三分灸三壯神門主治悸怔忡呆癡中惡恍惚驚兼治小兒驚癇證金針補瀉疾安寧注神門穴主治驚悸怔忡呆癡卒中鬼邪恍惚振驚及小兒驚癇等證針三分留七呼灸三壯炷如小麥少府主治久咳瘧肘腋拘急痛引胸兼治婦人挺痛癢男子遺尿偏墜疼注少府穴主治咳瘧久不愈臂酸肘腋攣急胸中痛及婦人陰挺陰癢陰痛男子遺尿偏墜等證針二分灸三壯曲澤主治心痛驚身熱煩渴肘掣疼兼治傷寒嘔吐逆針灸同施立刻寧注曲澤穴主治心痛善驚身熱煩渴臂肘搖動掣痛不能伸傷寒嘔吐氣逆等證針三分留七呼灸三壯間使主治脾寒證九種心疼瘧渴生兼治瘰癧生項下左右針灸自然平注間使穴主治脾寒證九種心痛脾疼瘧疾口渴及瘰癧久不愈患左灸右患右灸左針六分留七呼灸五壯內關主刺氣塊攻兼灸心胸脅痛疼勞熱瘧疾審補瀉金針抽動立時寧注內關穴主治氣塊上攻心胸脅肋疼痛勞熱瘧疾等證針五分灸五壯痰火胸疼刺勞宮小兒口瘡針自輕兼刺鵝掌風證候先補後瀉效分明注勞宮穴主治痰火胸痛小兒口瘡及鵝掌風等證針二分禁灸商陽主刺卒中風暴僕昏沉痰塞壅少商中衝關衝少少澤三稜立回生注中衝穴乾坤生意云此為十井穴凡初中風跌倒卒暴昏沉痰盛不省人事牙關緊閉藥水不下急以三稜針刺中衝少商商陽關衝少衝少澤使血氣流通實起死回生急救之妙訣也三里三間並二間主治牙疼食物難兼治偏風眼目疾針灸三穴莫教偏注三里三間二間三穴主治牙齒疼痛食物艱難及偏風眼目諸疾三穴並針灸之三里穴針二分灸三壯二間穴針三分灸三壯三間穴針三分灸三壯合谷主治破傷風痹痛筋急針止疼兼治頭上諸般病水腫産難小兒驚注合谷穴主治破傷風風痹筋骨疼痛諸般頭痛水腫産難及小兒急驚風等證針三分留六呼灸三壯陽溪主治諸熱證癮疹痂疥亦當針頭痛牙痛咽喉痛狂妄驚中見鬼神注陽溪穴主治熱病煩心癮疹痂疥厥逆頭痛牙疼咽喉腫痛及狂妄驚恐見鬼等證針三分留七呼灸三壯曲池主治是中風手攣筋急痛痹風兼治一切瘧疾病先寒後熱自然平注曲池穴主治中風手攣筋急痹風瘧疾先寒後熱等證針五分灸七壯肩井一穴治僕傷肘臂不舉淺刺良肩髃主治癱瘓疾手攣肩腫效非常注肩井穴主治僕傷肘臂疼痛不舉針五分灸五壯孕婦禁針肩髃穴主治癱瘓手攣肩腫針六分灸五壯少澤主治衄不止兼治婦人乳腫疼大陵一穴何專主嘔血瘧疾有奇功注少澤穴主治鼻衄不止婦人乳腫針一分灸三壯大陵穴主治嘔血瘧疾針六分灸三壯前谷主治癲癇疾頸項肩臂痛難堪更能兼治産無乳小海喉齦腫痛痊注前谷穴主治癲癇頸項頰腫引耳疼痛及婦人産後無乳等證針一分留三呼灸三壯小海穴主治咽喉牙齦腫痛等證針二分灸五壯腕骨主治臂腕疼五指諸疾治可平後溪能治諸瘧疾能令癲癇漸漸輕注腕骨穴主治臂腕五指疼痛針二分灸三壯後溪穴主治瘧疾癲癇針一分灸一壯陽谷主治頭面病手膊諸疾有多般兼治痔漏陰痿疾先針後灸自然痊注陽谷穴主治頭面項腫手膊疼痛不舉及痔漏陰痿等證針二分灸三壯支正穴治七情郁肘臂十指盡皆攣兼治消渴飲不止補瀉分明自可安注支正穴主治七情鬱結不舒肘臂十指筋攣疼痛及消渴飲水不止等證針三分灸三壯液門主治喉齦腫手臂紅腫出血靈又治耳聾難得睡刺入三分補自寧注液門穴主治咽喉外腫牙齦痛手臂紅腫耳暴聾不得眠等證針三分留二呼灸三壯中渚主治肢木麻戰振蜷攣力不加肘臂連肩紅腫痛手背癰毒治不發注中渚穴主治四肢麻木戰振蜷攣無力肘臂連肩紅腫疼痛手背癰毒等證針二分灸三壯陽池主治消渴病口乾煩悶瘧熱寒兼治折傷手腕痛持物不得舉臂難注陽池穴主治消渴口乾煩悶寒熱瘧或因折傷手腕持物不得臂不能舉等證針二分禁灸外關主治臟腑熱肘臂脅肋五指疼瘰癧結核連胸頸吐衄不止血妄行注外關穴主治五臟六腑結熱鼻衄吐血不止及肘臂脅肋手指節痛瘰癧結核繞頸連胸腫痛不消等證針三分留七呼灸三壯支溝中惡卒心痛大便不通脅肋疼能瀉三焦相火盛兼治血脫暈迷生注支溝穴主治鬼擊卒心痛凡三焦相火熾盛及大便不通脅肋疼痛婦人産後血暈不省人事等證針二分留七呼灸七壯天井主瀉瘰癧疹角孫惟主目翳生耳門耳聾聤耳病絲竹空穴治頭風注天井穴主治瘰癧癮疹針三分灸五壯角孫穴主治目中生翳針三分灸三壯耳門穴主治耳聾聤耳膿汁針三分留三呼禁灸絲竹空穴主治頭痛目赤目眩視物䀮䀮針三分留三呼禁灸足部主病針灸要穴歌隱白主治心脾痛築賓能醫氣疝疼照海穴治夜發痓兼療消渴便不通注隱白穴主治心脾疼痛針一分灸三壯築賓穴主治氣疝針三分灸五壯照海穴主治夜發痓證及消渴大便閉針三分灸三壯大都主治溫熱病傷寒厥逆嘔悶煩胎産百日內禁灸千金主灸大便難注大都穴主治溫熱病汗不出傷寒手足逆冷腹滿嘔吐悶亂及大便難等證針三分留七呼灸三壯凡婦人懷孕及生産後未滿百日俱不宜灸太白主治痔漏疾一切腹痛大便難痞疸寒瘧商邱主兼治嘔吐瀉痢痊注太白穴主治痔漏腹中疼痛大便不通等證針三分留七呼灸三壯商白穴主治痞氣黃疸寒瘧及嘔吐瀉痢等證針三分留七呼灸三壯公孫主治痰壅膈腸風下血積塊疴兼治婦人氣蠱病先補後瀉自然瘥注公孫穴主治痰壅胸膈腸風下血積塊及婦人氣蠱等證針四分灸三壯三陰交治痞滿堅痼冷疝氣腳氣纏兼治不孕及難産遺精帶下淋瀝痊注三陰交穴主治痞滿痼冷疝氣遺精及婦人腳氣月信不調久不成孕難産赤白帶下淋瀝等證針三分灸三壯血海主治諸血疾兼治諸瘡病自輕陰陵泉治脅腹滿刺中下部盡皆松注血海穴主治女子崩中漏下月信不調帶下及男子腎臟風兩腿瘡癢濕痛等證針五分灸五壯陰陵泉穴主治脅腹脹滿陰痛足膝紅腫小便不通小便失禁不覺下部等證針五分留七呼灸三壯湧泉主刺足心熱兼刺奔豚疝氣疼血淋氣痛疼難忍金針瀉動自安寧注湧泉穴主治足發熱奔豚疝氣疼痛血淋氣痛等證針三分留三呼灸三壯然谷主治喉痹風咳血足心熱遺精疝氣溫瘧多渴熱兼治初生兒臍風注然谷穴主治喉痹唾血遺精溫瘧疝氣足心熱及小兒撮口臍風針三分留三呼灸三壯凡針不宜見血太溪主治消渴病兼治房勞不稱情婦人水蠱胸脅滿金針刺後自安寧注太溪穴主治消渴房勞不稱心意及婦人水蠱胸脅脹滿等證針三分留七呼灸三壯陰谷舌縱口流涎腹脹煩滿小便難疝痛陰痿及痹病婦人漏下亦能痊注陰谷穴主治舌縱涎下腹脹煩滿尿難小腹疝急引陰陰股內廉痛為痿痹及女人漏下不止針四分留七呼灸三壯復溜血淋宜乎灸氣滯腰疼貴在針傷寒無汗急瀉此六脈沉伏即可伸注復溜穴主治血淋氣滯腰痛傷寒無汗六脈沉匿者針三分留三呼灸五壯大敦治疝陰囊腫兼治腦衄破傷風小兒急慢驚風病炷如小麥灸之靈注大敦穴主治諸疝陰囊腫腦衄破傷風及小兒急慢驚風等證針二分留十呼灸三壯行間穴治兒驚風更刺婦人血蠱癥渾身腫脹單腹脹先補後瀉自然平注行間穴主治小兒急慢驚風及婦人血蠱癥瘕渾身腫單腹脹等證針三分留十呼灸三壯大沖主治腫脹滿行動艱辛步履難兼治霍亂吐瀉證手足轉筋灸可痊注太衝穴主治腫滿行步艱難及霍亂吐瀉手足轉筋等證針三分留十呼灸三壯中封主治遺精病陰縮五淋溲便難鼓脹癭氣隨年灸三里合灸步履艱注中封穴主治夢泄遺精陰縮五淋不得尿鼓脹癭氣此穴合足三里並灸治行步艱辛中封穴針四分留七呼灸三壯足三里穴針五分留七呼灸三壯曲泉㿉疝陰股痛足膝脛冷久失精兼治女子陰挺癢少腹冷痛血瘕癥注曲泉穴主治㿉疝陰股痛男子失精膝脛冷痛及女子陰挺出少腹疼痛陰癢血瘕等證針六分留七呼灸三壯伏兔主刺腿膝冷兼刺腳氣痛痹風若逢穴處生瘡癤説與醫人莫用功注伏兔穴主治腿膝寒冷腳氣痛痹針五分禁灸凡此穴處生瘡癤者危陰市主刺痿不仁腰膝寒如注水侵兼刺兩足拘攣痹寒疝少腹痛難禁注陰市穴主治痿痹不仁不得屈伸腰膝寒如注水兩足拘攣痹痛寒疝少腹疼痛等證針三分留七呼禁灸足三里治風濕中諸虛耳聾上牙疼噎膈鼓脹水腫喘寒濕腳氣及痹風注足三里穴治中風中濕諸虛耳聾上牙疼水腫心腹鼓脹噎膈哮喘寒濕腳氣上中下三部痹痛等證針五分留七呼灸三壯此穴三十外方可灸不爾反生疾解溪主治風水氣面腹足腫喘嗽頻氣逆發噎頭風眩悲泣癲狂悸與驚注解溪穴主治風氣面浮腹脹足腫喘滿咳嗽氣逆發噎頭痛目眩悲泣癲狂驚悸怔忡等證針五分留五呼灸三壯陷谷主治水氣腫善噫痛疝腹腸鳴無汗振寒痰瘧病胃脈得弦瀉此平注陷谷穴主治面目浮腫及水病善噫疝氣少腹痛腸鳴腹痛瘧疾振寒無汗等證或胃脈得弦皆宜針五分留七呼灸三壯內庭主治痞滿堅左右繆灸腹響寬兼刺婦人食蠱脹行經頭暈腹疼安注內庭穴主治痞滿堅硬針三分留十呼灸三壯患右灸左患左灸右但覺腹響是其效驗兼治婦人食蠱行經頭暈少腹痛等證厲兌主治尸厥證驚狂面腫喉痹風兼治足寒膝臏腫相偕隱白夢魘靈注厲兌穴主治尸厥口噤氣絶狀如中惡面腫喉痹驚狂好臥足寒膝臏腫痛等證針一分留一呼灸一壯此穴合隱白穴同針治夢魘不寧針一分灸三壯飛陽主治步艱難金門能療病癲癇足腿紅腫崑崙主兼治齒痛亦能安注飛陽穴主治步履艱難針三分灸三壯金門穴主治癲狂羊癇風針一分灸三壯崑崙穴主治足腿紅腫牙齒疼痛針三分灸三壯晝發痓證治若何金針申脈起沉疴上牙疼兮下足腫亦針此穴自平和注申脈穴主治晝發痓證足腫牙疼針三分留七呼灸三壯灸不及針環跳主治中風濕股膝筋攣腰痛疼委中刺血醫前證開通經絡最相應注環跳穴主治腰胯膝中受風寒濕氣筋攣疼痛針一寸留十呼灸三壯委中穴治證同環跳穴但此穴禁灸針五分陽陵泉治痹偏風兼治霍亂轉筋疼承山主針諸痔漏亦治寒冷轉筋靈注陽陵泉穴主治冷痹偏風霍亂轉筋針六分灸三壯承山穴主治痔漏疼痛寒冷轉筋針七分灸五壯灸不及針陽輔主治膝痠痛腰間溶溶似水浸膚腫筋攣諸痿痹偏風不遂灸功深注陽輔穴主治膝胻痠疼腰間寒冷膚腫筋攣百節痠疼痿痹偏風不遂等證針三分留七呼灸三壯風市主治腿中風兩膝無力腳氣衝兼治渾身麻搔癢艾火燒針皆就功注風市穴主治腿中風濕疼痛無力腳氣渾身搔癢麻痹等證針五分灸五壯懸鐘主治胃熱病腹脹肋痛腳氣疼兼治腳脛濕痹癢足指疼痛針可停注懸鐘穴主治胃熱腹脹脅痛腳氣腳脛濕痹渾身搔癢趾疼等證針六分灸五壯丘墟主治胸脅痛牽引腰腿髀樞中小腹外腎腳腕痛轉筋足脛不能行注丘墟穴主治胸脅滿痛不得息牽引腰腿髀樞中疼痛少腹外腎痛腳腕轉筋痛足脛難行等證針五分灸三壯頸漏腹下馬刀瘡連及胸脅乳癰瘍婦人月經不利病下臨泣穴主治良注臨泣穴主治頸漏腋下馬刀連及胸脅婦人乳癰月信不調等證針二分灸三壯俠溪主治胸脅滿傷寒熱病汗難出兼治目赤耳聾痛頷腫口噤疾堪除注俠溪穴主治胸脅支滿傷寒熱病汗不出目赤耳聾胸痛頷腫口噤等證針三分灸三壯竊陰主治脅間痛咳不得息熱躁煩癰疽頭痛耳聾病喉痹舌強不能言注竅陰穴主治脅痛咳逆不得息發熱躁煩癰疽口乾頭痛喉痹舌強耳聾等證針一分灸三壯
