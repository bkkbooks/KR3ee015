body:
  text: 卷二周身名位骨度頭注頭者人之首也凡物獨出之首皆名曰頭腦注腦者頭骨之髓也俗名腦子顛注顛者頭頂也顛頂之骨俗名天靈蓋囪注囟者顛前之頭骨也小兒初生未闔名曰囟門已闔名曰囟骨即天靈蓋後合之骨面注凡前曰面凡後曰背居頭之前故曰面也顏注顏者眉目間名也額顱注額前髮際之下兩眉之上名曰額一曰顙者亦額之謂也頭角注額兩旁稜處之骨也鬢骨注即兩太陽之骨也目注目者司視之竅也目胞注目胞者一名目窠一名目裹即上下兩目外衛之胞也目綱注目綱者即上下目胞之兩瞼邊又名曰睫司目之開闔也目內眥注目內眥者乃近鼻之內眼角以其大而圓故又名大眥也目外眥注目外眥者乃近鬢前之眼角也以其小而尖故稱目鋭眥也目珠注目珠者目睛之俗名也目系注目系者目睛入腦之系也目眶骨注目眶者目窠四圍之骨也上曰眉稜骨下即䪼骨䪼骨之外即顴骨䪼注目下之眶骨顴骨內下連上牙床者也頞注頞者鼻梁即山根也鼻注鼻者司臭之竅也兩孔之界骨名曰鼻柱下至鼻之盡處名曰準頭頄注頄䪼內鼻旁間近生門牙之骨也顴注顴者面兩旁之高起大骨也顑注顑者俗呼為腮口旁頰前肉之空軟處也耳注耳者司聽之竅也蔽注蔽者耳門也耳郭注耳郭者耳輪也頰注頰耳前顴側面兩旁之稱也曲頰注曲頰者頰之骨也曲如環形受頰車骨尾之鉤者也頰車注頰車者下牙床骨也總載諸齒能咀食物故名頰車人中注人中者鼻柱之下唇之上穴名水溝口注口者司言食之竅也唇注唇者口端也吻注吻者口之四周也頤注頤者口角後顑之下也頦注頦者口之下唇至末之處俗名下把殼也頷注頷者頦下結喉上兩側肉之空軟處也齒注齒者口齗所生之骨也俗名曰牙有門牙虎牙槽牙上下盡根牙之別舌注舌者司味之竅也舌本注舌本者舌之根也頏顙注頏顙者口內之上二孔司分氣之竅也懸雍垂注懸雍垂者張口視喉上似乳頭之小舌俗名碓嘴會厭注會厭者覆喉管之上竅似皮似膜發聲則開咽食則閉故為聲音之戶也咽注咽者飲食之路也居喉之後喉注喉者通聲息之路也居咽之前喉嚨注喉嚨者喉也肺之系也嗌注嗌者咽也胃之系也結喉注結喉者喉之管頭也其人瘦者多外見頸前肥人則隱於肉內多不見也胸膺注胸者缺盆下腹之上有骨之處也膺者胸前兩旁高處也一名曰臆胸骨肉也俗名胸膛𩩲骭注𩩲骭者胸之衆骨名也乳注乳者膺上突起兩肉有頭婦人以乳兒者也鳩尾注鳩尾者即蔽心骨也其質系脆骨在胸骨之下歧骨之間膈注膈者胸下腹上之界內之膜也俗名羅膈腹注腹者膈之下曰腹俗名曰肚臍之下曰少腹亦名小腹臍注臍者人之初生胞蒂之處也毛際注毛際者小腹下橫骨間叢毛之際也下橫骨俗名蓋骨篡注篡者橫骨之下兩股之前相合共結之凹也前後兩陰之間名下極穴又名屏翳穴會陰穴即男女陰氣之所也睪丸注睪丸者男子前陰兩丸也上橫骨注上橫骨在喉前宛宛中天突穴之外小灣橫骨旁接拄骨之骨也拄骨注拄骨者膺上缺盆之外俗名鎖子骨也內接橫骨外接肩解也肩解注肩解者肩端之骨節解處也髃骨注髃骨者肩端之骨也即肩胛骨頭臼之上稜骨也其臼接臑骨上端俗曰肩頭其外曲捲翅骨肩後之稜骨也其下稜骨在背肉內肩胛注肩胛者即髃骨之末成片骨也亦名肩髆俗名鍁板子骨臂注臂者上身兩大支之通稱也一名曰肱俗名胳膊胳膊中節上下骨交接處名曰肘肘上之骨曰臑骨肘下之骨曰臂骨臂骨有正輔二骨輔骨在上短細偏外正骨居下長大偏內俱下接腕骨也腕注腕者臂掌骨接交處以其宛屈故名也當外側之骨名曰高骨一名鋭骨亦名踝骨掌骨注掌者手之衆指之本也掌之衆骨名壅骨合湊成掌非塊然一骨也魚注魚者在掌外側之上隴起其形如魚故謂之魚也手注手者上體所以持物也手心注手心者即掌之中也手背注手背者手之表也指骨注指者手指之骨也第一大指名巨指在外二節本節在掌第二名食指又名大指之次指三節在外本節在掌第三中指名將指三節在外本節在掌第四指名無名指又名小指之次指三節在外本節在掌第五指為小指三節在外本節在掌其節節交接處皆有碎骨筋膜聯絡爪甲注爪甲者指之甲也足趾同岐骨注岐骨者凡骨之兩叉者皆名岐骨手足同臑注臑者肩髆下內側對腋處高起軟白肉也腋注腋者肩之下脅之上際俗名胳肢窩脅肋注脅者腋下至肋骨盡處之統名也曰肋者脅之單條骨之謂也統脅肋之總又名曰胠季脅注季脅者脅之下小肋骨也俗名軟肋䏚注䏚者脅下無肋骨空軟處也腦後骨注腦後骨者俗呼腦杓枕骨注枕骨者腦後骨之下隴起者是也其骨或稜或平或長或圓不一完骨注耳後之稜骨名曰完骨在枕骨下兩旁之稜骨也頸項注頸項者頸之莖也又曰頸者莖之側也項者莖之後也俗名脖項頸骨注頸者頭之莖骨肩骨上際之骨俗名天柱骨也項骨注項骨者頭後莖骨之上三節圓骨也背注背者後身大椎以下腰以上之通稱也膂注膂者夾脊骨兩旁肉也脊骨注脊骨者脊膂骨也俗名脊梁骨腰骨注腰骨者即脊骨十四椎下十五十六椎間尻上之骨也其形中凹上寬下窄方圓二三寸許兩旁四孔下接尻骨上際也胂注胂者腰下兩旁髁骨上之肉也臀注臀者胛下尻旁大肉也尻骨注尻骨者腰骨下十七椎十八椎十九椎二十椎二十一椎五節之骨也上四節紋之旁左右各四孔骨形內凹如瓦長四五寸許上寬下窄末節更小如人參蘆形名尾閭一名骶端一名橛骨一名窮骨在肛門後其骨上外兩旁形如馬蹄附著兩髁骨上端俗名胯骨肛注肛者大腸下口也下橫骨髁骨楗骨注下橫骨在少腹下其形如蓋故名蓋骨也其骨左右二大孔上兩分出向後之骨首如張扇下寸許附著於尻骨之上形如馬蹄之處名曰髁骨下兩分出向前之骨末如楗柱在於臀內名曰楗骨與尻骨成鼎足之勢為坐之主骨也婦人俗名交骨其骨面名曰髖俠髖之臼名曰機又名髀樞外接股之髀骨也即環跳穴處此一骨五名也股注股者下身兩大支之通稱也俗名大腿小腿中節上下交接處名曰膝膝上之骨曰髀骨股之大骨也膝下之骨曰胻骨脛之大骨也髀骨注髀者膝上之大骨也上端如杵接於髀樞下端如錘接於胻骨也胻骨注胻骨者俗名臁脛骨也其骨兩根在前者名成骨又名骭骨形粗膝外突出之骨也在後者名輔骨形細膝內側之小骨也伏兔注伏兔者髀骨前膝之上起肉似俯兔故曰伏兔膝解注膝解者膝之節解也臏骨注臏骨者膝上蓋骨也連骸注連骸者膝外側二高骨也膕注膕者膝後屈外俗名腿凹也腨注腨者下腿肚也一名腓腸俗名小腿肚踝骨注踝者胻骨之下足跗之上兩旁實出之高骨在外為外踝在內為內踝也足注足者下體所以趨走也俗名腳跗骨注跗者足背也一名足趺俗稱腳面跗骨者足趾本節之衆骨也足心注足心者即踵之中也跟骨注跟足後根之骨也趾注趾者足之指也其數五名為趾者別於手也居內之大者名大趾第二趾名大趾之次趾第三趾名中趾第四名小趾之次趾第五居外之小者名小趾足之指節與手指節同其大趾之本節後內側圓骨形突者名核骨三毛注足大趾爪甲後為三毛毛後橫紋為聚毛踵注踵者足下面著於地之謂也俗名腳底板骨度尺寸頭部項發以下至背骨長二寸半自後髮際以至大椎項骨三節處也按頭部折法以前髮際至後髮際折為一尺二寸如髮際不明則取眉心直上後至大杼骨折作一尺八寸此為直寸橫寸法以眼內角至外角此為一寸頭部橫直寸法並依此督脈神庭至太陽曲差穴曲差至少陽本神穴本神至陽明頭維穴各開一寸半自神庭至頭維各開四寸半胸腹部結喉以下至缺盆中長四寸此以巨骨上陷中而言即天突穴處缺盆以下𩩲骭之中長九寸胸圍四尺五寸兩乳之間廣九寸半當折八寸為當𩩲骭中下至天樞長八寸天樞足陽明穴名在臍旁此指平臍而言天樞以下至橫骨長六寸半橫骨橫長六寸半毛際下骨曰橫骨按此古數也以今用上下穴法參較多有未合宜從後胸腹折法為當兩髀之間廣六寸半此當兩股之中橫骨兩頭之處俗名髀縫按胸腹折法直寸以中行為之自缺盆中天突穴起至岐骨際上中庭穴止折作八寸四分自𩩲骭上岐骨際下至臍心折作八寸臍心下至毛際曲骨穴折作五寸橫寸以兩乳相去折作八寸胸腹橫直寸法並依此背部膂骨以下至尾骶二十一節長三尺膂骨脊骨也脊骨外小而內巨人之所以能負任者以是骨之巨也脊骨二十四節今云二十一節者除項骨三節不在內尾骶骨男子者尖女人者平腰圍四尺二寸按背部折法自大椎至尾骶通折三尺上七節各長一寸四分一釐共九寸八分七釐中七節各一寸六分一釐共一尺一寸二分七釐第十四節與臍平下七節各一寸二分六釐共八寸八分二釐共二尺九寸九分六釐不足四釐者有零未盡也直寸依此橫寸用中指同身寸法脊骨內闊一寸凡云第二行俠脊一寸半三行俠脊三寸者皆除脊一寸外淨以寸半三寸論故在二行當為二寸在三行當為三寸半也側部自拄骨下行腋中不見者長四寸拄骨頸項根骨也腋以下至季脅長一尺二寸季脅小肋也季脅以下至髀樞長六寸大腿曰股股上曰髀楗骨之下大腿之上兩骨合縫之所曰髀樞當足少陽環跳穴處也髀樞下至膝中長一尺九寸橫骨上廉下至內輔之上廉長一尺八寸骨際曰廉膝旁之骨突出者曰輔骨內曰內輔外曰外輔內輔之上廉以下至下廉長三寸半上廉下廉可摸而得內輔下廉下至內踝長一尺二寸內踝以下至地長三寸四肢部肩至肘長一尺七寸肘至腕長一尺二寸半臂之中節曰肘腕至中指本節長四寸臂掌之交曰腕本節至末長四寸半指之後節曰本節膝以下至外踝長一尺六寸膝膕以下至跗屬長一尺六寸膕腿灣也跗足面也膝在前膕在後跗屬者凡兩踝前後脛掌所交之處皆為跗之屬也跗屬以下至地長三寸外踝以下至地長一寸足長一尺二寸廣四寸半按骨度乃靈樞經骨度篇文所論之長短皆古數也然骨之大者太過小者不及此亦但言其則耳至於周身手足折量之法當用前中指同身寸法為是前頭面頸諸穴行列頭部頂中中行凡一穴百會屬督脈頭部前中行凡四穴神庭上星囟會前頂俱屬督脈兩旁第二行左右凡八穴曲差五處承光通天俱足太陽穴兩旁第三行左右凡六穴臨泣目窗正營俱足少陽穴正面部中行凡五穴素髎水溝兌端齦交俱督脈穴承漿任脈穴兩旁第二行左右凡十穴攢竹睛明俱足太陽穴迎香禾髎俱手陽明穴巨髎足陽明穴兩旁第三行左右凡十穴陽白足少陽穴承泣四白地倉大迎俱足陽明穴兩旁第四行左右凡八穴本神童子髎俱足少陽穴絲竹空手少陽穴顴髎手太陽穴頸部中行凡二穴廉泉天突俱屬任脈胸腹諸穴行列胸部中行凡七穴天突璇璣華蓋紫宮玉堂膻中中庭俱任脈兩旁第二行左右凡十二穴去中行任脈二寸俞府彧中神藏靈墟神封步廊俱足少陰兩旁第三行左右凡十二穴自氣戶夾俞府旁二寸去中行四寸氣戶庫房屋翳膺窗乳中乳根俱足陽明兩旁第四行左右凡十二穴自雲門夾氣戶旁二寸去中行六寸雲門中府俱手太陰周榮胸鄉天溪食竇俱足太陰腹部中行凡十五穴鳩尾巨闕上脘中脘建里下脘水分神闕陰交氣海石門關元中極曲骨會陰俱任脈兩旁第二行左右凡二十二穴自幽門夾巨闕兩旁各半寸循衝脈下行至橫骨幽門通