body:
  text: 卷一九針原始歌九針因何而有名原於大地大數生始於一而終於九天地人時音律星風野九九八十一針應其數起黃鐘皮肉筋脈聲陰陽齒氣九竅關節通注靈樞九針篇帝曰九針焉生何因有名岐伯曰天地之大數也始於一終於九一法天二法地三法人四法時五法音六法律七法星八法風九法野九針者聖人起天地之數始於一而終於九九而九之九九八十一以起黃鐘之數針之數應之而人之身形亦應之皮應天肉應地血脈應人筋應時聲應音陰陽應律齒面目應星氣應風九竅三百六十五絡應九野此天人相通之道也故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針益精八針除風九針通九竅除三百六十五節氣各有所主也九針式圖並九針主治法歌一曰鑱針式圖注經之一曰鑱針者取法於巾針去末寸半卒鋭之長一寸六分鑱者鋭也卒者尾也謂此針長一寸六分上去末寸半下只留一分之鋒欲淺刺不令深入也鑱針主治法歌鑱針即今箭頭針主刺皮膚邪肉侵毋令深入瀉陽氣邪正相安榮衛均注鑱針即今箭頭針也主刺邪熱病在頭身皮膚之證毋令深入深則有傷陽氣故必分許淺淺刺之使邪去而正不傷榮衛得和則病除矣二曰員針式圖注經之二曰員針者取法於絮針筒其身而卵其鋒長一寸六分筒身卵鋒者謂身直如竹筒未鋒員如卵鋭也員針主治法歌員針取法於絮針主治邪氣侵肉分筒身卵鋒不傷正利導分肉邪自平注員針即絮針也主治邪氣在分肉之間蓋筒身卵鋒利導分肉能使邪氣行而不傷於肌肉之正氣也三曰匙針式圖注經之三曰匙針者取法於黍粟之鋭長三寸半黍粟之鋭者員而微尖利於用補者也匙針主治法歌匙針之鋭如黍粟恐其深入傷肌肉按脈勿陷以致氣刺之邪氣使獨出注匙針之鋒如黍粟之鋭主治邪在脈中不欲深入只按脈以候氣至刺脈中之邪氣使獨出也若深按陷至肌肉邪氣雖出而肌肉之正氣必傷矣四曰鋒針式圖注經之四曰鋒針者取法於絮針刃三隅長一寸六分其上去八分下留八分刃三隅者蓋直壯而鋭可以瀉熱出血也鋒針主治法歌鋒針即今三稜名主刺瘤邪時氣壅發於經絡痼不解瀉熱出血榮衛通注鋒針即今三稜針主刺時氣溫熱瘤邪也凡發於經絡中壅痼不解之病用三稜針之鋒利以瀉熱出血使經絡開通榮衛調和而壅痼之疾愈矣五曰鈹針式圖注經之五曰鈹針者取法於劍鋒廣二分半長四寸其必廣二分半長四寸末如劍鋒者取其能開通也鈹針主治法歌鈹針之鋒末如劍主刺寒熱兩相搏合而為癰膿已成大膿一瀉即時和注鈹針之鋒末如劍者主刺寒熱相搏或邪氣鬱於榮衛凝滯不通發為癰疽其膿已成用此開之以取大膿大膿瀉則陰陽和而癰熱愈矣六曰員利針式圖注經之六曰員利針者取法於犛針微大其末反小其身長一寸六分其取法於犛者以毛之強者曰犛用其細健可稍深也員利針主治法歌員利針形尖如犛主治虛邪客於經暴痹走注歷節病刺之經絡即時通注員利針尖其形如犛員而且鋭主治虛邪客於經絡而為暴痹與走注歷節疼痛等病以此刺之則經絡流通而虛邪自去矣七曰毫針式圖注經之七曰毫針者尖如蚊虻喙取法於毫毛長二寸六分其必尖如蚊虻喙者取其微細徐緩也毫針主治法歌毫針主治虛痹纏養正除邪在徐緩寒熱痛痹浮淺疾靜入徐出邪正安注毫針者因取法於毫毛故名之也主刺邪客經絡而為痛痹邪氣輕淺者也凡正氣不足之人用此針刺之靜以徐往漸散其邪微以久留緩養正氣則寒邪痛痹浮淺之在絡者皆可平也八曰長針式圖注經之八曰長針者取法於綦針長七寸為其可以取深邪遠痹也長針主治法歌長針主治虛邪傷內舍骨解節腠殃欲取深邪除遠痹刺法得宜始可康注長針即今環跳針也主虛邪深入內舍於骨解腰脊節腠之間凡欲取深遠疼痛之邪必得身長末鋒之針如法以刺之方能使深邪出遠痹解而得安康也九曰大針式圖注經之九日大針者取法於鋒針其鋒微員長四寸尖形如梃粗而且巨可以瀉通機關也大針主治法歌大針主刺周身病淫邪溢於肌體中為風為水關節痹關節一利大氣通注大針者即古人之燔針也凡周身淫邪或風或水溢於肌體留而不能過於關節壅滯為病者以此刺之使關節利大氣通則淫邪壅於經絡風虛腫毒傷於肌體者皆可去也按此九針皆本於靈樞經中大小長短之法無有異也但細玩經中九針之用凡所取者皆言有餘之實邪則針之不宜於治虛也從可知矣行針次第手法歌行針手法口訣多撮要編為十二歌取穴持溫進指攝退搓捻留搖拔合注十二字分次第手法歌訣始自三衢楊繼洲後之諸家口訣雖多皆不免於繁雜今撮其要仍編為十二歌訣庶簡明切當便於後學一取穴歌取穴先將爪切深須教毋外慕其心令彼榮衛無傷礙醫者方堪入妙針注凡下針用左手大指爪甲重切所針之穴令氣血開教病者心專於內不要外馳然後下針使針不傷榮衛方堪入妙也二持針歌持針之士要心雄手如握虎莫放鬆欲識機關三部奧須將此理再推窮注凡下針之士須心小力雄以右手持針於穴上勢若握虎不敢放鬆著力旋插直至應止之處吸氣三口然後提針徐徐而用凡機關三才奧理欲識於心而行於針者須將此再三推窮可也三溫針歌溫針之理最為良口內溫和審穴方毋令冷熱相爭搏榮衛宣通始安祥注凡下針必先將所用之針入於口中使之溫熱審定穴所方可與刺勿令冷熱相爭庶血氣調和而得安祥也四進針歌進針理法取關機失經失穴最不宜陽經取陷陰經脈三思已定針之愈注凡下針要病人神氣定息數勻醫者亦如之關機最密切勿太忙須細審經絡穴所在何部分不可輕施其針失於經絡穴所也如在陽部必取筋骨間陷下之處則不傷於筋骨如在陰分郤膕之內動脈相應間則以爪重切經絡少待片時方可進針而不傷於榮衛又必三思已定然後下針病可愈矣五指循歌部分經絡要指循只為針頭不緊沉推則行之引則止調和血氣使來臨注凡下針若氣不至用指於所屬部分經絡之路上下左右推而行之引而止之往來循之使氣血上下均勻針下自然氣至沉緊得氣即瀉之意也六攝法歌攝法原因氣滯經大指爪甲切莫輕以指攝針待氣至邪氣流行針自輕注凡攝針者因針下邪氣滯澀不行也隨經絡上下用大指爪甲重切之使正氣流行則邪氣不能滯澀而針下自覺活動矣七退針歌退針手法理要知三才訣內總玄機一部六數三吸氣須臾疾病自然愈注凡退針全在手法三才之內皆有要訣玄機不可不知如欲退針必須緩緩而出自地部退至人部再漸退至天部俱用少陰之六數瀉之每一部六數須要少停三部共行三六一十八數令病人吸氣三口隨吸隨提徐徐退至天部其疾病自然除矣八搓針歌搓針瀉氣最為奇氣至針纏莫就移渾如搓線攸攸轉急則纏針肉不離注搓針者凡進退搓捻皆催其氣至以瀉邪氣也如覺針下氣緊切勿就移須用瀉法但微微動轉如搓線之狀若摶之太緊必至肉纏針頭邪氣滯澀而不能除矣九捻針歌捻針指法不相同一般在手兩般功內外轉移行上下助正伏邪疾自輕注凡捻針時雖一般在手而指法不同故功有兩般也如欲治上則大指向外捻外捻者令其氣向上也如欲治下則大指向內捻內捻者令其氣至下也內捻為之補外捻為之瀉如經絡向下者轉針頭逆之則為迎也經絡向上者移針頭順之則為隨也指法得宜則正氣自復而邪氣自退矣十留針歌留針取氣候沉浮出入徐徐必逗留能令榮衛縱橫散巧妙玄機在指頭注留針者凡出針至於天部入針至於地部須在皮膚肌肉間徐徐容留令榮衛宣散方可出針入針若出針太急則血隨針出反傷榮衛其巧妙玄機全在指頭也十一搖針歌搖針三部皆六搖依次推排在指梢孔穴大開無窒礙邪氣退除病自消注搖針者如出針三部欲瀉之際每一部搖二三搖多者不過六搖而已以指捻針如扶人頭搖之之狀使孔穴開大無有窒礙庶邪氣退除而病愈矣十二拔針歌拔針之時切勿忙閉門存神要精詳不沉不緊求針尾此訣須當韞錦囊注凡針畢拔針最要精詳不可輕率忙亂也如欲出針須待針下氣緩不沉不緊覺輕動滑快方以右指捻住針尾以左手大指按其針穴及穴外之皮令針穴門戶不開神氣內存然後拔針庶不致於出血此針家要訣須當韞於錦囊也行針分寸法歌行針分寸中指傳屈指中節兩紋尖男左女右童稚一長短肥瘦審經權注行針取分寸法以同身寸法為準男左手女右手以中指第二節屈指兩紋尖相去為一寸童稚亦如之雖人身有長短體有肥瘦入針之分數不一而身形之長者其指節亦長身形短者其指節亦短但隨其長短以取分寸則自准矣肥人肌肉肥厚血氣充滿宜刺三分半瘦人肌肉瘦薄血氣未盛宜刺二分然雖如此猶當有經有權不可執一而論如遇不肥不瘦之人只在二三分之間酌量取之可也男左女右手中指第二節屈指兩紋尖相去為一寸取稻稈心量或薄篾量皆易折而不伸縮為準用繩則伸縮不便故多不準十二經井滎俞經合原刺淺深歌出井流滎注為俞行經入合臟俞原春宜針滎夏針俞秋宜針合冬井間臟病針俞腑病合臟腑有病皆針原凡諸井穴肌肉淺不宜深針自古傳注井滎俞經合原十二經穴名也手足陽經有原穴手足陰經無原穴陰之俞穴即陰之原穴也所出為井井者如水之出也所流為滎滎者如水之流也所注為俞俞者如水之注也所行為經經者如水之行也所入為合合者如水之會也原者如水之源也夫春針滎者取絡脈在分肉間刺之淺者也夏針俞者取孫絡在肌肉皮膚之上也秋針合者亦取絡脈在分肉間故如春時之所刺冬針井者取絡脈孫絡之下比他時所刺則深而留之以冬氣入臟故也經原之原手足陰陽之經諸病皆宜刺之但所刺有深有淺不能枚舉此四時針刺之大旨自古相傳者也五臟井滎俞經合歌太陰肺脈井少商魚際之穴號滎鄉太淵一穴名為俞經渠經合尺澤當太陰脾井隱白穴流於大都滎來接太白為俞經商丘陰陵泉與合為穴少陰心脈井少衝尋至少府即名滎神門一穴為俞穴經合靈道少海真少陰腎脈井湧泉然谷為滎本天然太溪為俞經復溜陰谷為合踝前旋厥陰心包井中衝掌中勞宮即為滎大陵穴取名為俞間使經合曲澤終厥陰肝脈井大敦行間之穴便為滎太衝之處為俞穴經閣中封曲泉名六腑井滎俞原經合歌陽明大腸井商陽二間為滎俞三間合谷原經陽溪取曲池為合正相當陽明胃脈井厲兌內庭為滎須要會陷谷名俞衝陽原經合解溪三里位太陽小腸井少澤流於前谷為滎穴後溪為俞原腕谷經合陽谷小海歇太陽膀胱井至陰通谷為滎亦穴名束骨為俞原京骨崑崙為經合委中少陽三焦井關衝尋至液門號為滎俞原中渚陽池取經合支溝天井中少陽膽脈井竅陰俠溪為滎是穴名俞原臨泣丘墟穴經歸陽輔合陽陵十二經表裡原絡總歌臟腑有病均宜刺原絡表裡相隨看肺原太淵大偏歷大肺合谷列缺端脾原太白胃豐隆胃脾衝陽公孫間心原神門小支正小心腕骨通里邊腎原太溪膀飛陽膀腎京骨大鐘班三焦陽池包內關包原大陵焦外關膽原丘墟肝蠡溝肝膽太衝光明閒注凡臟腑有病均可以刺之即難經云五臟六腑有病皆取其原者是也蓋各經有所主之病必隨其各經表裡先主後客並刺之主者原穴也客者絡穴也如手太陰肺經病可刺本經里之原穴即太淵穴也復刺大腸表之絡穴即偏歷穴也手陽明大腸經病可刺本經表之原穴即合谷穴也復刺肺經里之絡穴即列缺穴也足太陰脾經病可刺本經里之原穴即太白穴也復刺胃經表之絡穴即豐隆穴也足陽明胃經病可刺本經表之原穴即衝陽穴也復刺脾經里之絡穴即公孫穴也手少陰心經病可刺本經里之原穴即神門穴也復刺小腸經表之絡穴即支正穴也手太陽小腸經病可刺本經表之原穴即腕骨穴也復刺心經里之絡穴即通里穴也足少陰腎經病可刺本經里之原穴即太溪穴也復刺膀胱經表之絡穴即飛揚穴也足太陽膀胱經病可刺本經表之原穴即京骨穴也復刺腎經里之絡穴即大鐘穴也手少陽三焦經病可刺本經表之原穴即陽池穴也復刺心包絡經表之絡穴即內關穴也手厥陰心包絡經病可刺本經里之原穴即大陵穴也復刺三焦經表之絡穴即外關穴也足少陽膽經病可刺本經表之原穴即丘墟穴也復刺肝經里之絡穴即蠡溝穴也足厥陰肝經病可刺本經里之原穴即太衝穴也復刺膽經表之絡穴即光明穴也此十二經主病之原穴為主絡穴為客隨表隨里之刺法也肺經表裡原絡穴主治歌肺經原絡應刺病胸脹溏瀉小便頻灑翕寒熱咳喘短木痛皮膚肩缺盆注肺經里之原穴太淵大腸表之絡穴偏歷二穴應刺之證即胸脹溏瀉小便頻數灑灑惡寒翕翕發熱咳嗽喘促短氣皮膚肩背缺盆麻木疼痛皆肺大腸經病也大腸經表裡原絡穴主治歌大腸原絡應刺病大大指次次指不用肩臂疼氣滿皮膚木不仁面頰腮腫耳聾鳴注大腸表之原穴合谷肺經里之絡穴列缺二穴應刺之證即手之大指次指不用肩臂疼痛皮膚麻木不仁面頰腮腫耳鳴耳聾皆大腸肺經病也脾經表裡原絡穴主治歌脾經原絡應刺病重倦面黃舌強疼腹滿時痛吐或瀉善飢不食脾病明注脾經里之原穴太白胃經表之絡穴豐隆二穴應刺之證即身重倦怠面黃舌強而疼腹滿時時作痛或吐或瀉善飢而不欲食皆脾胃經病也胃經表裡原絡穴主治歌胃經原絡應刺病項膺股胻足跗疼狂妄高歌棄衣走惡聞煙火木音驚注胃經表之原穴衝陽脾經里之絡穴公孫二穴應刺之證即項頸胸膺胯股脛胻足跗疼痛發狂妄言高歌棄衣而走惡煙火聞木音即驚皆胃脾經病也心經表裡原絡穴主治歌心經原絡應刺病消渴背腹引腰疼眩僕咳吐下泄氣熱煩好笑善忘驚注心經里之原穴神門小腸表之絡穴支正二穴應刺之證飲水即消背腹引腰作痛眩暈仆倒上咳吐下泄氣熱而心煩好笑善忘多驚皆心與小腸經病也小腸經表裡原絡穴主治歌小腸原絡應刺病顴頷耳腫苦寒熱肩臑肘臂內外廉痛不能轉腰似折注小腸表之原穴腕骨心經里之絡穴通里二穴應刺之證即顴頷耳腫苦寒熱肩臑肘臂內外側痛不能轉動腰痛似折皆小腸心經病也腎經表裡原絡穴主治歌腎經原絡應刺病大小腹痛大便難臍下氣逆脊背痛唾血渴熱兩足寒注腎經里之原穴太溪膀胱表之絡穴飛揚二穴應刺之證即大腹少腹脊背疼痛大便結燥臍下氣逆上衝口渴吐血兩足寒冷皆腎膀胱經病也膀胱經表裡原絡穴主治歌膀胱原絡應刺病目脫淚出頭項疼臍突大小腹脹痛按之尿難溲血膿注膀胱表之原穴京骨腎經里之絡穴大鐘二穴應刺之證即目胞脫陷淚出頭項疼痛臍突大腹少腹脹痛按之其尿難出而溲血膿皆膀胱腎經病也三焦經表裡原絡穴主治歌三焦原絡應刺病小指次指如廢同目眥耳後喉腫痛自汗肩臑內外疼注三焦表之原穴陽池心包里之絡穴內關二穴應刺之證即手之小指次指如廢而不能用目眥耳後咽喉腫痛自汗肩臑內外側疼皆三焦包絡經病也心包絡經表裡原絡穴主治歌心包原絡應刺病面紅目赤笑不休心中動熱掌中熱胸腋臂手痛中求注心包里之原穴大陵三焦表之絡穴外關二穴應刺之證即面紅目赤好笑不休心中動悸內熱手心熱胸腋與臂手疼痛皆心包絡三焦經病也膽經表裡原絡穴主治歌膽經原絡應刺病口苦胸脅痛不寧髀膝外踝諸節痛太息馬刀俠瘤癭注膽經表之原穴丘墟肝經里之絡穴蠡溝二穴應刺之證即口苦胸脅髀膝外踝諸節疼痛太息馬刀癭瘤皆膽肝經病也肝經表裡原絡穴主治歌肝經原絡應刺病頭痛頰腫脅疝疼婦人少腹胞中痛便難溲淋怒色青注肝經里之原穴太衝膽經表之絡穴光明二穴應刺之證即頭痛頰腫脅疝疼痛婦人少腹胞中疼痛大便難小便淋好怒色青皆肝膽經病也八脈交會八穴歌公孫衝脈胃心胸內關陰維下總同臨泣膽經連帶脈陽維目鋭外關逢後溪督脈內眥頸申脈陽蹺絡亦通列缺任脈行肺系陰蹺照海膈喉嚨注公孫二穴是足太陰脾經穴也通於衝脈內關二穴此二穴是手厥陰心包絡穴也四穴通於陰維脈四經會合循行之處在胃心胸之間故主治胃與心胸之病也臨泣二穴是足少陽膽經穴也通於帶脈外關二穴此二穴是手少陽三焦經穴也四穴通於陽維脈四經會合連絡之處在於目鋭眥耳後頰頸肩之間故主治目鋭眥耳後頰頸肩之病也後溪二穴是手太陽小腸經穴也通於督脈申脈二穴此二穴是足太陽膀胱經穴也四穴通於陽蹺脈四經會合別絡之處在於目內眥頸項耳肩膊小腸膀胱之間故主治目內眥頸項耳肩膊小腸膀胱之病也列缺二穴是手太陰肺經穴也通於任脈照海二穴此二穴是足少陰腎經穴也四穴通於陰蹺脈四經會合系絡之處在於肺系咽喉胸膈之間故主治肺系咽喉胸膈之病也衝脈公孫穴主治歌九種心疼病不寧結胸翻胃食難停酒食積聚腸鳴見水食氣疾膈臍疼腹痛脅脹胸膈滿瘧疾腸風大便紅胎衣不下血迷心急刺公孫穴自靈注九種心疼者曰飲曰食曰風曰冷曰熱曰悸曰蟲曰注曰去來痛結胸者胸滿硬痛也翻胃者朝食暮吐食難停留也傷酒傷食積滯腸胃雷鳴水食氣疾膈間臍腹疼痛兩脅作脹胸膈滿悶瘧疾腸風大便下血以及婦人胞衣不下瘀血上攻迷心皆宜刺此公孫穴則立應也陰維內關穴主治歌中滿心胸多痞脹腸鳴泄瀉及脫肛食難下膈傷於酒積塊堅硬橫脅旁婦女脅疼並心痛裡急腹痛勢難當傷寒不解結胸病瘧疾內關可獨當注中滿心胸痞脹謂腹滿心胸痞脹不通快也腸鳴泄瀉謂暴瀉脫肛也食難下膈傷於酒者謂嘔吐食不能下或因酒傷也積塊堅硬橫衝於脅婦女心脅疼痛裡急脹痛傷寒結胸硬痛瘧疾裡實等病皆刺內關無不愈矣帶脈臨泣穴主治歌中風手足舉動難麻痛發熱筋拘攣頭風腫痛連腮項眼赤而疼合頭眩齒痛耳聾咽腫證遊風搔癢筋牽纏腿疼脅脹肋肢痛針入臨泣病可痊注中風手足舉動難謂手足不遂也若疼痛麻木拘攣兼發熱者風熱也頭風旋暈及腫痛連腮項目牙齒兩耳咽喉皆赤腫痛遊風搔癢筋脈牽引腰脅四肢與肋疼痛等證皆宜刺此臨泣穴立時有奇功也陽維外關穴主治歌肢節腫疼與膝冷四肢不遂合頭風背胯內外筋骨痛頭項眉稜病不寧手足熱麻夜盜汗破傷跟腫目睛紅傷寒自汗烘烘熱惟有外關針極靈注四肢骨節腫痛兩膝痹冷手足不遂偏正頭風脊背腰胯筋骨頭項眉稜疼痛手足發熱麻木夜間盜汗及破傷遊風腳跟腫痛兩眼赤紅傷寒陽明自汗蒸熱烘烘皆宜刺外關穴其病立已督脈後溪穴主治歌手足拘攣戰掉眩中風不語並癲癇頭疼眼腫漣漣淚背腰腿膝痛綿綿項強傷寒病不解牙齒腮腫喉病難手足麻木破傷風盜汗後溪穴先砭注手足拘攣者屈伸難也戰掉者手足顫搖不能握也眩者暈也中風卒然昏僕不能語言癲癇不省人事瘈瘲抽掣頭痛及暴發火眼熱淚常流行痹腿膝背腰歷節周身疼痛項強傷寒感冒汗不出不能解上下牙齒腮齦咽喉腫疼手足麻木不仁破傷受風寢汗等證先砭後溪穴開通脈道無不愈矣陽蹺申脈穴主治歌腰背脊強足踝風惡風自汗或頭疼手足麻攣臂間冷雷頭赤目眉稜痛吹乳耳聾鼻衄血癲癇肢節苦煩疼遍身腫滿汗淋漓申脈先針有奇功注腰背脊強不能俯仰也足內踝紅腫名繞踝風也足外踝紅腫名穿踝風也惡風自汗與雷頭風痛暴發火眼眉稜骨痛手足麻木拘攣臂冷及婦人吹乳乳房紅腫未産者名內吹已産者名外吹也耳聾鼻衄癲癇抽搐肢節煩疼遍身腫滿頭汗淋漓等證此皆風熱痰飲流注攻衝為病並宜先針申脈立時有功任脈列缺穴主治歌痔瘡肛腫泄痢纏吐紅尿血嗽咳痰牙痛喉腫小便澀心胸腹疼噎咽難産後發強不能語腰痛血疾臍腹寒死胎不下上攻膈列缺一刺病乃痊注內痔肛腫泄痢赤白咳痰唾血尿血及牙齦咽喉腫痛小便赤澀艱難心胸腹痛噎咽不快産後敗血上干心氣身發強直不能語言或瘀滯腰痛臍腹間寒子死腹中胎衣不下上攻膈塞並刺列缺其證必痊陰蹺照海穴主治歌喉閉淋澀與胸腫膀胱氣痛並腸鳴食黃酒積臍腹痛嘔瀉胃翻及乳癰便燥難産血昏迷積塊腸風下便紅膈中不快梅核氣格主照海針有靈注上焦火盛咽喉閉塞不通下焦熱結膀胱氣痛小便淋澀胸中腫痛或食積酒積內蓄傷脾發黃或臍腹痛或嘔瀉胃翻吐食乳癰大便燥結及婦人生産艱難瘀血塊痛昏迷腸風下血不已或膈中之氣怏怏不快如梅核氣格塞咽喉之間咯之不出咽之不下等疾急刺照海穴則諸證自散手足十二經所屬歌五臟六腑共包絡手足所屬三陰陽太陰足脾手肺臟陽明足胃手大腸少陰足腎手心臟太陽足膀手小腸厥陰足肝手包絡少陽足膽手焦當注五臟心肝脾肺腎六腑膽胃大腸小腸膀胱三焦共包絡分屬手足三陰三陽為十二經也如肺手太陰心手少陰心包絡手厥陰手之三陰也手太陽小腸手陽明大腸手少陽三焦手之三陽也足太陽膀胱足陽明胃足少陽膽足之三陽也足太陰脾足少陰腎足厥陰肝足之三陰也天干十二經表裡歌甲膽乙肝丙小腸丁心戊胃己脾鄉庚屬大腸辛屬肺壬屬膀胱癸腎臟三焦陽府須歸丙包絡從陰丁火旁陽干為表陰乾里臟腑表裡配陰陽按舊云三焦亦向壬中寄包絡同歸入癸方夫三焦為決瀆之官猶可言壬而包絡附於心主烏可云癸況二臟表裡皆相火也故改正之注甲丙戊庚壬陽干也乙丁己辛癸陰乾也陽干為表為腑陰乾為里為臟故曰臟腑表裡配陰陽也地支十二經流注歌每日寅時從肺起卯時流入大腸經辰胃巳脾午心火未時應注小腸經申屬膀胱酉屬腎戌走包絡亥焦宮子膽醜肝寅又肺十二經脈周環行注人有十二經晝夜有十二時每一經主一時先從寅時入肺起卯入於大腸辰入於胃巳入於脾午入於心未入於小腸申入於膀胱酉入於腎戌入於包絡亥入於三焦子入於膽醜入於肝至於寅時則又從肺起此十二經與十二時相循環而行者也十二經相傳次序歌肺大胃脾心小腸膀腎包焦膽肝續手陰臟手陽手頭足陰足腹陽頭足注人身正脈十有二經每於平旦寅時營氣始於中焦上注於手太陰肺經自胸中而出於中府至於少商以次行於手陽明大腸等十二經終於足厥陰肝經而復始於太陰肺經也凡手之三陰從臟走手手之三陽從手走頭足之三陰從足走腹足之三陽從頭走足周流不息循環無端也十二經起止歌肺起中府止少商大腸商陽止迎香胃起承泣終厲兌脾起隱白大包鄉心起極泉少衝止小腸少澤止聽宮膀胱睛明止至陰腎起湧泉俞府終包絡天池中衝止三焦關衝止竹空膽瞳子髎止竅陰肝起大敦止期門十二經穴周流歌中府為初注少商少商別絡注商陽商陽復向迎香走香接頭維至庫房維下降兮趨厲兌兌傳隱白至胸鄉隱白上升達大包大包仍續極泉場泉貫少衝心部井少澤相連即小腸澤會聽宮睛明分睛明下造至陰強至陰斜出湧泉底泉穴還歸腧府臟腧府天池橫絡截池出中衝心主張中衝並與關衝合關衝宛轉絲竹傍絲竹更貫瞳髎穴瞳髎下入竅陰方竅陰橫亙大敦井敦上期門肝脈當期門歷遍還中府經絡周流仔細詳十二經氣血多少歌多氣多血惟陽明少氣太陽厥陰同二少太陰常少血六經氣血要分明注手陽明大腸足陽明胃此二經多氣多血之經也三焦膽腎心脾肺此六經多氣少血也心包絡膀胱小腸肝此四經乃多血少氣也
