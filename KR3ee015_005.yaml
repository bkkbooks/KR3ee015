body:
  text: 卷五腎臟經文經云腎者作強之官伎巧出焉又云腎附於脊之十四椎下是經常少血多氣其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩主藏精與志中藏經曰腎者精神之舍性命之根張介賓云腎有兩枚形如豇豆相併而曲附於脊之兩旁相去各一寸五分外有黃脂包裹各有帶二條上條繫於心下條趨脊下大骨在脊骨之端如半手許中有兩穴是腎帶經過處上行脊髓至腦中連於髓海腎經循行經文腎足少陰之脈起於小趾之下斜趨足心之湧泉穴出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨俠舌本其支者從肺出絡心注胸中腎經循行歌足腎經脈屬少陰小趾斜趨湧泉心然骨之下內踝後別入跟中腨內侵出膕內廉上股內貫脊屬腎膀胱臨直者屬腎貫肝膈入肺循喉舌本尋支者從肺絡心內仍至胸中部分深注足少陰腎經之脈起自足太陽小趾之下至陰穴斜趨足心湧泉穴出然谷穴之下循內踝後太谿穴從太谿別入跟中大鐘穴從大鐘循行水泉照海復溜交信穴上腓內築賓穴也從築賓出膕內廉陰谷穴從陰谷上股內後廉橫骨穴從橫骨內貫行脊屬腎絡膀胱也其直者從腎外行大赫氣穴四滿中注肓俞商曲石關陰都通谷等穴入內貫肝與膈外循幽門步廊神封靈墟神藏彧中俞府等穴入肺中循循嚨挾舌本而終其支者從肺出絡心注胸中以交於手厥陰經也腎經穴歌足少陰腎二十七湧泉然谷照海出太谿水泉連大鐘復溜交信築賓立陰谷橫骨趨大赫氣穴四滿中注得肓俞商曲石關蹲陰都通谷幽門值步廊神封出靈墟神藏彧中俞府畢腎經分寸歌足掌心中是湧泉然谷內踝一寸前太谿踝後跟骨上大鐘跟後踵中邊水泉溪下一寸覓照海踝下四分真復溜踝後上二寸交信後上二寸聯二穴只隔筋前後太陰之後少陰前前傍骨是復溜後傍骨是交信二穴只隔一條筋築賓內踝上腨分陰谷膝下曲膝間橫骨大赫並氣穴四滿中注亦相連五穴上行皆一寸中行旁開五分邊肓俞上行亦一寸但在臍旁半寸間商曲石關陰都穴通谷幽門五穴聯五穴上下一寸取各開中行五分前步廊神封靈墟穴神藏彧中俞府安上行寸六旁二寸俞府璇璣二寸觀注湧泉穴在足心陷中伸腿屈足卷指宛宛中是其穴也從湧泉上行足內踝前起大骨下陷中然谷穴也從然谷行足內踝後五分跟骨上動脈陷中太谿穴也從大溪行足跟後跟中大骨上兩筋間大鐘穴也從大鐘行太谿下一寸內踝下水泉穴也從水泉行足內踝下四分前後有筋上有踝骨下有軟骨之中陷中照海穴也從照海行足內踝後除踝上二寸許前傍骨陷中復溜穴也從復溜斜外上行復溜穴之後二寸許後傍筋交信穴也從交信斜外上行過三陰交穴上腨分中築賓穴也腨者俗名腿肚也從築賓上行膝下內輔骨後大筋下小筋上按之應手屈膝得之陰谷穴也從陰谷上行入腹陰上橫骨中宛曲如仰月中央去任脈之中行旁開五分橫骨穴也從橫骨上行一寸大赫穴也亦去中行旁開五分從大赫上行一寸氣穴穴也亦去中行旁開五分從氣穴穴上行一寸四滿穴也亦去中行旁開五分從四滿上行一寸中注穴也亦去中行旁開五分從中註上行一寸肓俞穴也直臍旁去臍中五分從肓俞上行二寸商曲穴也亦去中行旁開五分從商曲上行一寸石關穴也亦去中行旁開五分從石關上行一寸陰都穴也亦去中行旁開五分從陰都上行一寸陷中通谷穴也亦去中行旁開五分從通谷上行一寸陷中幽門穴也亦去中行旁開五分從幽門上行一寸六分陷中去中行旁開二寸仰而取之步廊穴也從步廊上行一寸六分亦去中行旁開二寸仰而取之神封穴也從神封上行一寸六分亦去中行旁開二寸陷中仰而取之靈墟穴也從靈墟上行一寸六分亦去中行旁開二寸陷中仰而取之神藏穴也從神藏上行一寸六分亦去中行旁開二寸陷中仰而取之彧中穴也從彧中上行巨骨下俠任脈之璇璣中行旁開二寸陷中仰而取之是其穴也三焦經文經云上焦如霧中焦如漚下焦如瀆又云三焦者決瀆之官水道出焉又云是經少血多氣中藏經云三焦者人之三元之氣也號曰中清之府總領五臟六腑營衛經絡內外左右上下之氣也三焦通則內外左右上下皆通也其於周身灌體和內調外榮左養右導上宣下莫大於此也三焦經循行經文三焦手少陽之脈起於小指次指之端上出次指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項俠耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥三焦經循行歌手經少陽三焦脈起自小指次指端兩指岐骨手腕表上出臂外兩骨間肘後臑外循肩上少陽之後交別傳下入缺盆膻中分散絡心包膈里穿支者膻中缺盆上上項耳後耳角旋屈下至出䪼仍注頰一支出耳入耳前卻從上關交曲頰至目銳眥乃盡焉注手少陽三焦之脈起於手小指次指外側之端關衝穴從關衝上出兩指之間液門中渚穴循手腕表陽池穴也從陽池出臂外兩骨之間外關支溝會宗三陽絡四瀆天井等穴上貫肘清冷淵穴也從清冷淵穴循臂臑外上肩循消濼臑會肩髎天髎穴從天髎穴而交出足少陽經之後入缺盆布膻中散絡心包下膈內而循行之分皆屬三焦經也其支者從膻中上外出缺盆上項天牖穴從天牖穴循系耳後翳風瘈脈顱息穴從顱息直上出耳上角角孫穴絲竹空穴也由角孫絲竹空穴繞耳以屈下至䪼和髎耳門穴也其本支之別支者從耳後出走耳前過足少陽經客主人穴之前交頰至目銳之外眥以交於足少陽膽經也三焦經穴歌手少三焦所從經二十二穴起關衝液門中渚陽池歷外關支溝會宗逢三陽絡入四瀆內注於天井清冷中消濼臑會肩髎穴天天牖經翳風瘈脈顱息角耳門和髎上行絲竹空三焦經分寸歌無名外側端關衝液門小次指陷中中渚液門上一寸陽池腕前表陷中外關腕後二寸陷關上一寸支溝名外關一寸會宗平斜上一寸三陽絡肘前五寸四瀆稱天井肘外大骨後肘上一寸骨罅中井上一寸清冷淵消濼臂肘分肉端臑會肩端前二寸肩臑上陷中看天肩井後一寸天牖耳下一寸間翳風耳後尖角陷瘈脈耳後青脈看顱息青絡脈之上角孫耳上發下間耳門耳前缺處陷和橫動脈耳前欲覓絲竹空何在眉後陷中仔細觀注關衝穴在手四指外側端去爪甲角如韭葉許是其穴也從關衝上行手小指次指岐骨間陷中握拳取之液門穴也從液門上行一寸陷中中渚穴也從中渚由四指本節直上行手表腕上陷中陽池穴也從陽池上行手腕後二寸兩骨間陷中外關穴也從外關上行一寸兩骨間陷中支溝穴也從支溝外開一寸會宗穴也以支溝會宗二穴相併平直空中相離一寸也從會宗內斜上行一寸臂上大交脈三陽絡穴也從三陽絡上行肘前五寸外廉陷中四瀆穴也從四瀆斜外一行肘外大骨尖後肘上一寸兩筋叉骨罅中屈肘拱胸取之天井穴也從天井上行一寸伸肘舉臂取之清冷淵穴也從清冷淵上行肩下臂外肘上分肉間消濼穴也從消濼上行臑外去肩端三寸宛宛中臑會穴也從臑會上行肩端臑上陷中斜舉臂取之肩髎穴也從肩髎上行肩缺盆中直是少陽經之肩井穴後一寸天髎穴也從天髎上行頸大筋外缺盆上手太陽經天容穴後足太陽經天柱穴前足少陽膽經完骨穴下髮際中上斜俠耳後一寸天牖穴也從天牖上行耳後尖角陷中按之引耳中痛翳風穴也從翳風上行耳後中間雞足青絡脈中瘈脈穴也從瘈脈行耳後上間青絡脈中顱息穴也從顱息上行耳上上間髮際下開口有空角孫穴也從角孫繞行耳前起肉當耳缺處陷中耳門穴也從耳門行耳前兌發下橫動脈中和髎穴也兌發下即鬢角也從和髎上行眉後陷中絲竹空穴也膽腑經文經云膽者中正之官決斷出焉又云是經少血多氣又曰凡十一臟皆取決於膽也難經曰膽在肝之短葉間重三兩三銖長三寸盛精汁三合中藏經曰膽者清淨之府號曰將軍主藏而不瀉膽經循行經文膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾岐骨內出其端還貫爪甲出三毛膽經循行歌足脈少陽膽之經始從兩目銳眥生抵頭循角下耳後腦空風池次第行手少陽前至肩上交少陽右上缺盆支者耳後貫耳內出走耳前銳眥循一支銳眥大迎下合手少陽抵項根下加頰車缺盆合入胸貫膈絡肝經屬膽仍從脅裡過下入氣街毛際縈橫入髀厭環跳內直者缺盆下腋膺過季脅下髀厭內出膝外廉是陽陵外輔絕骨踝前過足跗小指次指分一支別從大指去三毛之際接肝經注足少陽膽經之脈起於目之銳眥瞳子髎穴循聽會客主人穴上抵頭角頷厭穴也從頷厭循懸顱懸釐曲鬢率谷折而下行於耳後之天衝浮白竅陰完骨等穴折外上行至眉頭之本神陽白臨泣目窗正營承靈腦空等穴循頸至風池穴過手少陽經天牖穴之前至肩上本經之肩井穴從肩井穴卻交出於手少陽之後入缺盆處也其支者從耳後入耳中出走耳前至目銳眥後此一小支之脈行於頭之無穴處也又其支者別銳眥下手陽明之大迎穴合手少陽抵於䪼下加頰車下頸合缺盆穴以下入胸中貫膈絡肝屬膽循脅裡出氣街散布臟腑外繞毛際橫入髀厭中環跳穴也其支者從缺盆下腋淵液穴從淵液穴循胸輒筋穴也從輒筋日月穴過季脅至京門穴從京門循行帶脈五樞維道居髎下合髀厭中環跳穴也從環跳穴以下循髀陽風市穴從風市循行中瀆陽關出膝外廉陽陵泉穴也從陽陵泉穴循行陽交外丘光明等穴下外輔骨之前陽輔穴也從陽輔穴直下抵絕骨之端懸鐘穴從懸鐘下出外踝之前丘墟穴從丘墟穴循足跗上臨泣穴也從臨泣入小指次指之間俠谿竅陰穴也其支者別跗上入大指之間循大指岐骨內出其端還貫爪甲出三毛以交於足厥陰肝經也膽經穴歌足少陽經瞳子髎四十三穴行迢迢聽會客主頷厭集懸頗懸釐曲鬢翹率谷天衝浮白次竅陰完骨本神至陽白臨泣開目窗正營承靈腦空是風池肩井淵液長輒筋日月京門鄉帶脈五樞維道續居髎環跳市中瀆陽關陽陵復陽交外丘光明陽輔高懸鐘丘墟足臨泣地五俠谿竅陰畢膽經分寸歌足少陽兮四十三頭上廿穴分三折起自瞳子至風池積數陳之依次第外眥五分瞳子耳前陷中尋聽會上行一寸客主人內斜曲角上頷厭後行顱中釐下穴曲鬢耳前上髮際率谷入發寸半安天衝耳後斜二寸浮白下行一寸間竅陰穴在枕骨下完骨耳後入髮際量得四分須用記本神神庭旁三寸入發四分耳上系陽白眉上一寸許上行五分是臨泣臨後寸半目窗穴正營承靈及腦空後行相去一寸五風池耳後發陷中肩井肩上陷中取大骨之前寸半明淵液腋下行三寸輒筋復前一寸行日月乳下二肋縫下行五分是穴名臍上五分傍九五季肋俠脊是京門季下寸八尋帶脈帶下三寸穴五樞維道章下五三定維下三寸居髎名環跳髀樞宛中陷風市垂手中指終膝上五寸中瀆穴膝上二寸陽關尋陽陵膝下一寸住陽交外踝上七寸外丘外踝七寸同此係斜屬三陽分踝上五寸定光明踝上四寸陽輔穴踝上三寸是懸鐘丘墟踝前陷中取丘下三寸臨泣存臨下五分地五會會下一寸俠谿輪欲覓竊陰穴何在小指次指外側尋注瞳子髎在目銳眥去眥五分是其穴也從瞳子髎下外斜行耳前起骨上面下一寸耳珠下動脈宛宛中開口有空側臥張口取之聽會穴也從聽會上直行一寸開口有空側臥張口取之客主人穴也從客主人上內斜行兩太陽曲角上廉頷厭穴也從頷厭後行耳前曲角上兩太陽之中懸顱穴也從懸顱後行耳前曲角上兩太陽下廉懸釐穴也從懸釐後行耳前入髮際曲隅陷中鼓頷有空曲鬢穴也從曲鬢後行耳上入髮際寸半陷者宛宛中嚼牙取之率谷穴也從率谷後行耳後三分許入髮際二寸天衝穴也從天衝下行耳後入髮際一寸浮白穴也從浮白下行耳後高上枕骨下搖動有空竅陰穴也從竅陰行耳後入髮際四分完骨穴也從完骨折上行神庭旁三寸直耳上入髮際四分本神穴也從本神行眉上一寸直瞳子陽白穴也從陽白上直行入髮際五分陷中正睛取之臨泣穴也從臨泣後行一寸目窗穴也從目窗後行一寸正營穴也從正營後行一寸五分承靈穴也從承靈後行一寸五分腦空穴也從腦空下行耳後下發際陷中大筋外廉按之引於耳中風池穴也從風池下行肩上會其支者合缺盆上大骨前一寸半以三指按取當中指下陷中肩井穴也從肩井下行腋下三寸宛宛中舉臂取之淵液穴也從淵液下行復前一寸三肋端橫直蔽骨旁七寸五分半直兩乳側臥屈上足取之輒筋穴也從輒筋行乳下二肋端縫下五分日月穴也從日月行監骨腰中季肋本俠脊臍上五分旁開九寸半側臥屈上足伸下足舉臂取之京門穴也從京門下行季脅下一寸八分陷中臍上二分旁開八寸半帶脈穴也從帶脈下三寸五樞穴也從五樞下行過肝經之章門穴下五寸三分維道穴也從維道下行三寸監骨上陷中居髎穴也從居髎下行髀樞中側臥伸下足屈上足取之環跳穴也從環跳下行膝上外廉兩筋中以手著腿中指盡處風市穴也從風市下髀骨外膝上外廉五寸分肉間陷中中瀆穴也從中瀆下行膝上二寸犢鼻外陷中陽關穴也從陽關下行膝下一寸外廉陷中尖骨前筋骨間蹲坐取之陽陵泉穴也從陽陵泉下行足外踝上七寸內斜三陽分肉間陽交穴也從陽交行外踝上七寸外斜外丘穴也從外丘下行外踝上五寸光明穴也從光明下行一寸輔骨前絕骨端內斜三分陽輔穴也從陽輔下行三寸外踝骨尖內動脈中尋按取之懸鐘穴也從懸鐘行外踝下斜前陷中丘墟穴也從丘墟下行三寸在足小指四指本節後足跗間陷中臨泣穴也從臨泣下行五分足小指四指本節後間陷中地五會穴也從地五會下行一寸足小指四指本節前岐骨間陷中俠谿穴也從俠谿下行足小指四指外側端去爪甲角如韭葉竅陰穴也肝臟經文經云肝者將軍之官謀慮出焉又云肝居膈下上著脊之九椎下是經常多血少氣其合筋也其榮爪也主藏魂開竅於目其繫上絡心肺下亦無竅難經曰肝重二斤四兩左三葉右四葉凡七葉肝之為臟其治在左其臟在右脅右腎之前並胃著脊之第九椎肝經循行經文肝足厥陰之脈起於大指聚毛之上上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹俠胃屬肝絡膽上貫膈布脅循喉嚨之後上入頏顙連目系上出額與督脈會於顛其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺肝經循行歌厥陰足脈肝所終大指之端毛際叢足跗上廉太衝分踝前一寸入中封上踝交出太陰後循膕內廉陰股沖環繞陰器抵小腹俠胃屬肝絡膽逢上貫膈里布脅肋俠喉頏顙目系同脈上顛會督脈出支者還生目系中下絡頰裡環唇內支者便從膈肺通注足厥陰肝經之脈起於足大指聚毛之際大敦行間穴從行間上循足跗上廉太衝穴從太衝穴去內踝一寸至於中封穴也從中封穴循行內踝五寸入於蠡溝穴也從蠡溝上踝七寸中都穴上內踝八寸交出於足太陰陰經之後上踝內廉膝關曲泉穴也從曲泉循股陰陰包五里穴入於毛中之陰廉穴過陰器入抵小腹上行於章門穴從章門循行期門穴從期門內行俠胃屬肝絡膽上貫膈布脅肋散布於臟腑循喉嚨之後上入頏顙連目系上額與督脈會於顛也其有一支者不上會於顛但從目下頰裡環唇內又一支復從肝別貫膈上注於肺以交於手太陰肺經也肝經穴歌足厥陰經一十四大敦行間太衝是中封蠡溝伴中都膝關曲泉陰包次五里陰廉上急脈章門才過期門至肝經分寸歌大敦足大端外側行間兩指縫中間太衝本節後二寸中封內踝前一寸蠡溝踝上五寸是中都上行二寸中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上行四寸氣衝三寸下五里陰廉氣衝下二寸急脈毛際旁二五厥陰大絡系睪丸章門臍上二旁六期門從章斜行乳直乳二肋端縫已注大敦穴在足大指端去爪甲後如韭葉許外側聚毛中是其穴也從大敦上行足大指次指歧骨縫間動脈應手陷中行間穴也從行間上行二寸許足跗間動脈應手陷中太衝穴也從太衝上行足內踝前一寸筋里宛宛中中封穴也從中封上行內踝上五寸蠡溝穴也從蠡溝上行二寸當胻骨中中都穴也從中都上行犢鼻下二寸旁陷者中膝關穴也從膝關上行膝內輔骨下大筋上小筋下陷中屈膝橫紋頭取之曲泉穴也從曲泉上行膝上四寸股內廉兩筋間蜷足取之看膝內側有槽中陰包穴也從陰包上行在足陽明胃經之氣衝穴下三寸陰股中動脈應手五里穴也從五里上行羊矢下斜里三分直上氣衝下二寸動脈陷中陰廉穴也從陰廉上行陰上中行兩旁相去二寸半按之隱指而堅甚按則痛引上下此厥陰之大絡為睪之系急脈穴也從急脈上行足太陰脾經之大橫穴外季肋直臍軟骨端臍上二寸兩旁開六寸側臥取肘尖盡處章門穴也從章門上行足陽明胃經之不容穴旁一寸五分上直乳第二肋端期門穴也
