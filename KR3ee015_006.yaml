body:
  text: 卷六奇經八脈總歌正經經外是奇經八脈分司各有名任脈任前督於後衝起會陰腎同行陽蹺跟外膀胱別陰起跟前隨少陰陽維維絡諸陽脈陰維維絡在諸陰帶脈圍腰如束帶不由常度號奇經注脈有奇常十二經者常脈也奇經則不拘於常故謂之奇也蓋人之氣血常行於十二經脈經脈滿溢流入他經別道而行故名奇經奇經有八曰任督沖帶陽蹺陰蹺陽維陰維是也任脈任於前督脈督於後衝脈為諸脈之海帶脈猶身之束帶陽蹺為足太陽之別陰蹺為足少陰之別陽維則維絡諸陽陰維則維絡諸陰陰陽相維諸經乃調故此八脈譬猶圖設溝渠以備水潦斯無濫溢之患人有奇經亦若是也任脈循行經文素問骨空論曰任脈者起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目靈樞五音五味篇曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹上行會於咽喉別而絡口唇任脈循行歌任脈起於中極下會陰腹裡上關元循內上行會衝脈浮外循腹至喉咽別絡口唇承漿已過足陽明上頤間循面入目至睛明交督陰脈海名傳注任脈者起於中極之下中極者穴名也在少腹聚毛處之上毛際也中極之下謂曲骨之下會陰穴也以上毛際循腹裡上關元者謂從會陰循內上行會於衝脈為經絡之海也其浮而外者循腹上行至於咽喉別絡口唇至承漿而終上頤循面入目至睛明者謂不直交督脈由足陽明承泣穴上頤循面入目內眥之足太陽睛明穴始交於督脈總為陰脈之海也任脈穴歌任脈中行二十四會陰潛伏兩陰間曲骨之前中極在關元石門氣海邊陰交神闕水分處下脘建里中脘前上脘巨闕連鳩尾中庭膻中玉堂聯紫宮華蓋循璇璣天突廉泉承漿端任脈分寸歌任脈會陰兩陰間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸名石門臍下寸半氣海全臍下一寸陰交穴臍之中央即神闕臍上一寸為水水臍上二寸下脘列臍上三寸名建里臍上四寸中脘許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻下寸六取膻中卻在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸八璣上一寸天突起天突喉下約四寸廉泉頷下骨尖已承漿頤前唇稜下任脈中央行腹裡注會陰穴在前陰後陰之中間任督沖三脈所起督由會陰而行背任由會陰而行腹沖由會陰而行足也從會陰上行橫骨上毛際陷中動脈應手臍下五寸曲骨穴也從曲骨上行在臍下四寸中極穴也從中極上行在臍下三寸即關元穴也從關元上行在臍下二寸石門穴也從石門上行在臍下一寸五分宛宛中氣海穴也從氣海上行在臍下一寸陰交穴也從陰交上行當臍之中神闕穴也從神闕上行臍上一寸水分穴也從水分上行臍上二寸下脘穴也從下脘上行臍上三寸建里穴也從建里上行在臍上四寸中脘穴也從中脘上行在臍上五寸上脘穴也從上脘上行在兩歧骨下二寸巨闕穴也從巨闕上行一寸鳩尾穴也從鳩尾上行一寸陷中中庭穴也從中庭上行一寸六分膻中穴也從膻中上行一寸六分陷中玉堂穴也從玉堂上行一寸六分陷中紫宮穴也從紫宮上行一寸六分陷中華蓋穴也從華蓋上行一寸陷中璇璣穴也從璇璣上行一寸天突穴也從天突上行在頷下結喉上中央舌本下仰而取之廉泉穴也從廉泉上行在頤前下唇稜下陷中承漿穴也督脈循行經文素問骨空論曰督脈者起於少腹以下骨中央女子入系廷孔其孔尿孔之端也其絡循陰器合篡間繞篡後別繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交顛上入絡腦還出別下項循肩髆內俠脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央督脈循行歌督脈少腹骨中央女子入系尿孔疆男子之絡循陰器繞篡之後別臀方至少陰者循腹裡會任直上關元行屬腎會沖街腹氣入喉上頤環唇當上系兩目中央下始合內眥絡太陽上額交顛入絡腦還出下項肩髆場俠脊抵腰入循膂絡腎莖篡等同鄉此是申明督脈路總為陽脈之督綱注督脈者起於少腹下骨中央謂男女少腹以下橫骨內之中央即女子入系廷孔之端男子陰器合篡間也男子陰莖盡處精室孔尿孔合併一路合篡處也即女子胞孔尿孔合併之處廷孔之端即下文曰與女子等也其絡循陰器合篡間繞篡後行是謂本絡外合太陽中絡也別絡繞臀是謂別絡內並少陰腹裡也故經曰至少陰與巨陽中絡者合也至少陰者循行上股內後廉循腹裡與任脈上會於關元貫脊屬腎俠腎上行與衝脈會於腹氣之街故經曰自少腹直上貫臍中央上貫心入喉上頤環唇內行至督脈齦交而終外行系兩目之下中央循行目內眥會於太陽故經曰與太陽起於目內眥上額交顛上入絡腦還出別下項循肩髆內俠脊抵腰中入循膂絡腎復會於少陰此督脈之循行也督脈穴歌督脈行脈之中行二十八穴始長強腰俞陽關入命門懸樞脊中中樞長筋縮至陽歸靈臺神道身柱陶道開大椎啞門連風府腦戶強間後頂排百會前頂通囟會上星神庭素髎對水溝兌端在唇上齦交上齒縫之內督脈分寸歌附督脈解尾閭骨端是長強二十一椎腰俞當十六陽關十四命三一懸樞脊中央十椎中樞筋縮九七椎之下乃至陽六靈五身三身柱陶道一椎之下鄉一椎之上大椎穴上至髮際啞門行風府一寸宛中取腦戶二五枕之方再上四寸強間位五寸五分後頂強七寸百會頂中取耳尖前後發中央前頂前行八寸半前行一尺囟會量一尺一寸上星位前發尺二神庭當鼻端準頭素髎穴水溝鼻下人中藏兌端唇上端上取齦交唇內齒縫鄉注督脈之別起於長強者即繞篡後外合太陽循行尾閭間長強穴也俠膂上項散頭上下當肩左右別走太陽入貫膂謂督脈循外而上行也故難經曰起於下極之俞即長強尾閭間也並於脊裡即俠脊也上至風府入屬於腦即上項散頭也從長強貫脊上行二十一椎下腰俞穴也十六椎下陽關穴也十四椎下命門穴也十三椎下懸樞穴也十一椎下脊中穴也十椎下中樞穴也九椎下筋縮穴也七椎下至陽穴也六椎下靈臺穴也五椎下神道穴也三椎下身柱穴也一椎下陶道穴也一椎之上大椎穴也上至上髮際啞門穴也從啞門入髮際風府穴也從風府上行一寸五分枕骨上腦戶穴也從腦戶上行一寸五分強間穴也從強間上行一寸五分後頂穴也從後頂上行一寸五分直兩耳尖頂陷中百會穴也從百會前行一寸五分前頂穴也從前頂前行一寸五分囟會穴也從囟會又前行一寸上星穴也從上星至前髮際神庭穴也前後髮際合骨度共一尺二寸也從前髮際下至鼻端準頭素穴也鼻柱下溝中央近鼻孔陷中水溝穴也唇上端兌端穴也唇內齒上齦縫中齦交穴也凡二十八穴循行背之中行者也按督脈始於長強者本自靈樞經脈篇曰督脈之別名長強俠膂上項散頭上下當肩胛左右別走太陽入貫膂難經二十八難曰督脈者起於下極之俞並於脊裡之上至風府入屬於腦乃指穴而言也前論督脈起於少腹者是指循行而言也衝脈循行經文素問骨空論曰衝脈者起於氣街並少陰之經俠臍上行至胸中而散靈樞衛氣篇曰請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之於腦氣在胸者止之膺與背俞氣在腹者止之背俞與衝脈在臍之左右之動脈者氣在脛者止之於氣街與承山踝上衝脈循行歌衝脈起於腹氣街後天宗氣氣衝來並於先天之真氣相併俠臍上胸街大氣至胸中而散會合督任充身懷分布臟腑諸經絡名之曰海不為乖注衝脈者起於氣街是起於腹氣之街也名曰氣街者是謂氣所行之街也一身之大氣積於胸中者有先天之真氣是所受者即人之腎間動氣也有後天之宗氣是水穀所化者即人之胃氣也此所謂起於腹氣之街者是起胃中谷氣也並於少陰者是並於腎間動氣也其真氣與穀氣相併俠臍上行至胸中而散是謂大氣至胸中分布五臟六腑諸經而充身者也靈樞逆順肥瘦篇曰衝脈者五臟六腑之海也五臟六腑皆稟氣焉靈樞動俞篇又曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街靈樞五音五味篇又曰衝脈任脈皆起於胞中者即此之起於腎下之謂也而謂起於腎下者即並於少陰之經腎間動氣上行也素問骨空論曰衝脈起於氣衝者即此出於氣街之謂也不曰起而曰出者謂穀氣由陽明胃經出而會於氣街也衝脈穴歌衝脈俠臍起橫骨大氣四注肓俞同商石陰通幽門穴至胸散布任流行衝脈分寸歌附任督沖三脈合解衝脈分寸同少陰起於橫骨至幽門上行每穴皆一寸穴開中行各五分注衝脈起於足陽明並於足少陰腹氣之街俠臍中行左右五分而上行自少腹下尖陰上橫骨穴從橫骨穴上行大赫氣穴四滿中注肓俞商曲石關陰都通谷幽門等共十一穴每穴上行相去各一寸中行左右各五分按任督沖三脈素問骨空論曰任脈起於中極之下毛際以上是外指少腹之分也循腹裡是內指胞中也督脈起於少腹以下骨中央女子廷孔男子陰器合篡貫脊屬腎亦是外指少腹內指胞中也衝脈起於氣街並少陰之經亦是指於胞中也雖未明言胞中而實未嘗不起於胞中也是以知任督沖三脈皆起於胞中然三脈皆後天水穀所化胃氣出於氣街會於胞中與先天腎間動之真氣並行而充身者也由此觀之三脈同出一源無疑矣故王冰內經注甲乙經針灸圖經以任脈循背者謂之督脈自少腹上謂之任脈亦謂之督脈則是以背腹陰陽別為名目耳然衝脈亦起於胞中並足少陰而上行是任脈督脈衝脈乃一源而三岐者故人身之有腹背猶天地之有子午任督之有前後猶二陸之分陰陽也胞中者謂男女丹田之通稱也在女子謂之女子胞在男子即精室也帶脈循行經文靈樞經脈別篇曰足少陰上至臑中別走太陽而合上至腎當十四椎出屬帶脈二十八難曰帶脈者起於季脅回身一周帶脈循行歌帶脈足少陰經脈上膕別走太陽經合腎十四椎屬帶起於季脅繞身行注帶脈本由足少陰經之脈上至膕中別走太陽而合腎當十四椎出屬帶脈故起於季脅繞身一周行也帶脈穴歌帶起少陽帶脈穴繞行五樞維道間京門之下居髎上周迴季脅束帶然注足少陰之正脈出於然谷循內踝後其別者入跟中上腨內至膕中別走而合太陽上至腎之氣穴穴當十四椎內與足少陰衝脈會外與足少陽帶脈合會而不與衝脈偕行出於季脅屬少陽帶脈穴也故難經曰帶脈者起於季脅也回身一周者謂起於足少陽帶脈穴循行五樞穴維道穴不行居髎穴回行如帶故曰帶脈也帶脈分寸歌帶脈部分足少陽季脅寸八是其鄉由帶三寸五樞穴過章五三維道當注帶脈部分在足少陽經季脅之下一寸八分即帶脈穴也從帶脈穴下三寸即五樞穴也從五樞下行過肝經之章門穴下五寸三分即維道穴也陽蹺陰蹺脈循行經文靈樞脈度篇曰蹺脈者少陰之別起於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目目氣不榮則目不合二十八難曰陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽蹺脈循行歌陽蹺脈起於跟中上合三陽外踝行從脅循肩入頸頄屬目內眥太陽經注陽蹺之脈起於足跟之中上合三陽外踝上行從脅少陽居髎之穴上循肩入頸頄陽明之肩髃承泣等穴屬目內眥而會太陽也陽蹺脈穴歌陽蹺脈起申僕陽居髎肩髃巨骨鄉臑俞地倉巨髎泣終於睛明一穴強陽蹺脈分寸歌陽蹺脈起足太陽申脈外踝五分藏僕參後繞跟骨下附陽外踝三寸鄉居監骨上陷取肩髃一穴肩尖當肩上上行名巨骨肩胛之上臑俞坊口吻旁四地倉位鼻旁八分巨髎疆目下七分是承泣目內眥出睛明昂注蹺者足也奇經涉於足者之名也曰陽者以其所行陽經也陽蹺者謂足太陽經之別脈也起於足太陽膀胱經足外踝下五分陷中申脈穴也從申脈繞後跟骨下僕參穴也從僕參穴又前斜足外踝上三寸附陽穴也又與足少陽會於季脅軟骨端下八寸三分居髎穴也又與手陽明會於膊骨頭肩端上肩髃穴也從肩髃穴上行肩尖上兩叉骨巨骨穴也又與手足太陽陽維會於肩後大骨下胛上廉臑俞穴也又與手足陽明會於夾口吻旁四分地倉穴也從地倉穴行於鼻孔旁八分巨髎穴也又與任脈足陽明會於目下七分承泣穴也又與手足太陽足陽明陰蹺會於目內眥外一分睛明穴也陰蹺脈循行歌陰蹺亦起於跟中少陰之別內踝行上循陰股入胸腹上至咽喉至睛明注陰蹺之脈亦起於跟中由少陰別脈然谷之穴上行內踝循陰股入胸腹上至咽喉睛明穴亦會於太陽也陰蹺脈穴歌陰蹺起於然谷穴上行照海交信列三穴原本足少陰足之太陽睛明接陰蹺脈分寸歌陰蹺脈起足少陰足內踝前然谷尋踝下一寸照海陷踝上二寸交信真目內眥外宛中取睛明一穴甚分明注陰蹺者以其所行陰經為足少陰之別脈也起於足少陰腎經足內踝前大骨下陷中然谷穴也從然谷穴循內踝之下一寸照海穴也從照海穴不循太谿穴又郄於足內踝之上二寸直行交信穴從交信穴上循陰股入陰而行上循胸裡入缺盆上出人迎之前入頄鼻旁屬目內眥外宛宛中睛明穴合於太陽陽蹺上行氣並相還則為濡目之用矣故知陰蹺脈氣若不與陽蹺脈氣並榮於目則目不能合也此陰蹺循行之經脈也陽維陰維脈循行經文二十八難曰陽維陰維者維絡於身溢蓄不能環流灌溢諸經者也故陽維起於諸陽之會陰維起於諸陰交也陽維脈循行歌陽維脈起足太陽外踝之下金門疆從胻背肩項面頭維絡諸陽會督場注陽維之脈起於足太陽經外踝之下金門穴也從胻骨背外肩胛項旁面上頭後至啞門穴維絡諸陽會於督脈也陽維脈穴歌陽維脈起穴金門臑俞天髎肩井深本神陽白並臨泣正營腦空風池巡風府啞門此二穴項後入發是其根陽維脈分寸歌陽維脈起足太陽外踝一寸金門藏踝上七寸陽交位肩後胛上臑俞當天髎穴在缺盆上肩上陷中肩井鄉本神入發四分許眉上一寸陽白詳入發五分臨泣穴上行一寸正營場枕骨之下腦空位風池耳後陷中藏項後入發啞門穴入發一寸風府疆注陽維起於諸陽之會者謂起於足太陽膀胱經之足外踝下一寸金門穴也從金門穴行於足少陽膽經之足外踝上七寸陽交穴也又與手足太陽及蹺脈會於肩後大骨下胛上廉臑俞穴也又與手足少陽會於缺盆中上毖骨際天髎穴也又會於肩上陷中肩井穴也從肩井穴上頭與足少陽會於眉上一寸陽白穴也從陽白穴上行於目上直入髮際本神臨泣穴也從臨泣穴上行二寸正營穴也從正營穴循行枕骨下腦空穴也從腦空穴下行至耳後大筋外廉風池穴也又與督脈會於項後風府啞門穴此陽維脈氣所發也陰維脈循行歌陰維脈起足少陰內踝上行穴築賓循腹至乳上結喉維絡諸陰會於任注陰維之脈起於足少陰經內踝上行築賓之穴循腹至乳上結喉至廉泉穴維絡諸陰會於任脈也陰維脈穴歌陰維之穴起築賓府舍大橫腹哀循期門天突廉舌本此是陰維脈維陰陰維脈分寸歌陰維脈起足少陰內踝之後尋築賓少腹之下稱府舍大橫平臍是穴名此穴去中三寸半行至乳下腹哀明期門直乳二肋縫天突結喉下一寸注陰維起於諸陰之交者謂起於足少陰腎經之足內踝後上分中名曰築賓穴也與足太陰交於少腹下去腹中行三寸半府舍穴也又平臍雲中行三寸半大橫穴也又行至乳下二肋端縫之下二寸腹哀穴也又與足厥陰交於乳下二肋端縫期門穴也又與任脈交於結喉下一寸宛宛中天突穴也從天突穴上行在頷下結喉上中央舌本下廉泉穴此陰維脈氣所發也
