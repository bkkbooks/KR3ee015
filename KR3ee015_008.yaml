body:
  text: 卷八灸難産穴歌橫逆難産灸奇穴婦人右腳小指尖炷如小麥灸三壯下火立産效通仙注婦人橫産子手先出諸符藥不效者灸此其穴在右腳小趾爪甲外側尖上即至陰穴也灸三壯艾炷如小麥下火立産針子戶穴歌子戶能刺衣不下更治子死在腹中穴在關元右二寸下針一寸立時生注胞衣不出子死腹中宜刺子戶穴針入一寸其穴在任脈經之關元穴傍右二寸灸遺精穴歌精宮十四椎之下各開三寸是其鄉左右二穴灸七壯夜夢遺精效非常注遺精灸精宮穴其穴在脊之十四椎下左右傍開各三寸灸七壯灸癆蟲穴歌鬼眼一穴灸癆蟲墨點病人腰眼中擇用癸亥亥時灸勿令人知法最靈注勞瘵日久不愈互相傳染因內有勞蟲宜灸鬼眼穴穴在腰間兩旁正身直立有微隱處用墨點記合面而臥以小艾炷灸七壯或九壯十一壯多寡量人蟲即吐瀉而也急取燒燬遠棄可免復傳擇癸亥日夜半六神皆聚亥時灸之勿使病人預知恐尸神有覺也灸痞根穴歌十二椎下痞根穴各開三寸零五分二穴左右灸七壯難消痞塊可除根注痞塊灸痞根穴其穴在脊之十二椎下旁開三寸半痞塊多在左則灸左在右則灸右如左右俱有左右俱灸之灸肘尖穴歌肘尖端處是奇穴男女瘰癧堪灸也左患灸右右灸左並灸風池效更捷注肘尖奇穴灸瘰癧左患灸右右患灸左如初起時男先灸左女先灸右兼灸風池穴尤效風池穴在腦後顳顬穴後髮際陷中灸鬼哭穴歌中惡振噤鬼魅病急灸鬼哭神可定兩手大指相併縛穴在四處之騎縫注鬼哭穴灸鬼魅狐惑恍惚振噤等證取穴將兩手大指相併縛定用艾炷於兩甲角反甲後肉四處騎縫著火灸之則患者哀告我自去為效灸中惡穴歌尸疰客忤中惡病乳後三寸量準行男左女右艾火灸邪祟驅除神自寧注灸尸疰客忤中惡等證其穴在乳後三寸男左女右灸之灸疝氣穴歌疝氣偏墜灸為先量口兩角折三尖一尖向上對臍中兩尖下垂是穴邊注灸疝痛偏墜奇穴法用稈心一條量患人口兩角為則折為三段如字樣以一角安臍中心兩角安臍下兩傍尖畫處是穴左患灸右右患灸左左右俱患左右俱灸艾炷如粟米大灸四壯灸翻胃穴歌翻胃上下灸奇穴上在乳下一寸也下在內踝之下取三指稍斜向前者注灸翻胃奇穴上穴在兩乳下一寸下穴在內踝下用手三指稍斜向前排之即是穴也灸腸風穴歌腸風諸痔灸最良十四椎下奇穴鄉各開一寸宜多灸年深久痔效非常注灸腸風諸痔奇穴其穴在脊十四椎下傍各開一寸年深者灸之最效灸暴絶穴歌鬼魘暴絶最傷人急灸鬼眼可回春穴在兩足大趾內去甲韭葉鬼難存注凡一切鬼魘暴絶當灸奇穴在足兩大趾內去爪甲如韭葉許名鬼眼穴灸之則鬼邪自去而病可愈也灸鬼眼穴歌腫滿上下灸奇穴上即鬼哭不用縛下取兩足第二趾趾尖向後寸半符注灸腫滿奇穴上穴即兩手大指縫鬼哭穴也下穴在兩足第二趾趾尖後一寸五分即是也灸贅疣穴歌贅疣諸痣灸奇穴更灸紫白二癜風手之左右中指節屈節尖上宛宛中注灸癜風及贅疣諸痣奇穴其穴在左右手中指節宛宛中俗名拳尖是也灸瘰癧穴歌瘰癧隔蒜灸法宜先從後發核灸起灸到初發母核止多著艾火效無匹注瘰癧隔蒜灸法用獨蒜片先從後發核上灸起到初發母核而止多灸自效灸腋氣歌腋氣除根剃腋毛再將定粉水調膏塗搽患處七日後視有黑孔用艾燒注凡腋氣先用快刀剃去腋毛淨乃用好定粉水調搽患處六七日後看腋下有一點黑者必有孔如針大或如簪尖即氣竅也用艾炷如米大者灸之三四壯愈永不再發灸瘋犬咬傷歌瘋犬咬傷先須吮吮盡惡血不生風次於咬處灸百壯常食炙韭不須驚注瘋犬咬傷之處急急用大嘴砂酒壺一個內盛乾燒酒燙極熱去酒以酒壺嘴向咬處如拔火罐樣吸盡惡血為度擊破自落上用艾炷灸之永不再發炙韭炒韭菜也灸蛇蠍蜈蚣蜘蛛咬傷歌蛇蠍蜈蚣蜘蛛傷即時疼痛最難當急以傷處隔蒜灸五六十壯效非常注凡蛇蠍蜈蚣蜘蛛咬傷痛急勢危者急用艾火於傷處灸之拔散毒氣即安或用獨蒜片隔蒜灸之二三壯換一片毒甚者灸五六十壯足三里穴歌三里膝眼下三寸兩筋間能除胸脅痛腹脹胃中寒腸鳴並泄瀉眼腫膝脛酸傷寒羸瘦損氣蠱證諸般氣過三旬後針灸眼光全注三里足三里穴也其穴在膝眼下三寸胻骨外廉大筋內宛宛中針五分留七呼灸三壯主治胸脅疼痛腹脹胃寒腸中雷鳴脾寒泄瀉眼目紅腫膝脛痠痛傷寒熱不已瘦弱虛損小腸氣痛與水氣蠱毒鬼擊諸證悉宜針灸但小兒忌灸恐眼目不明惟三十以外方可灸之令眼目光明也內庭穴歌內庭次趾外本屬足陽明能治四肢厥喜靜惡聞聲癮疹咽喉痛數欠及牙疼瘧疾不思食耳鳴針便清注內庭穴在足之大趾次趾外間陷中屬足陽明胃經穴也主治四肢厥逆喜靜惡聞人聲癮疹不快咽喉腫痛數欠牙齦疼瘧疾不思飲食耳內蟬鳴等證針三分留十呼灸三壯曲池穴歌曲池拱手取屈肘骨邊求善治肘中痛偏風手不收挽弓開不得臂瘓怯梳頭喉痹促欲死發熱更無休遍峰風癬癩針著即時瘳注曲池穴其穴在肘輔骨屈肘屈骨之中以手拱胸取之主治肘中疼痛偏風半身不遂臂痛拉弓不開兩臂癱瘓不能舉手向發喉痹喘促欲死傷寒振寒餘熱不盡皮膚乾燥痂疥等證刺七分留七呼灸三壯合谷穴歌合谷在虎口兩指歧骨間頭疼並面腫瘧病熱還寒體熱身汗出目暗視茫然齒齲鼻衄血口噤不能言針入深三分能令人病安注合谷穴其穴在手大指次指歧骨間陷中主治偏正頭疼面目浮腫瘧疾寒熱身體發熱汗不收目翳視物不明齒蠹朽痛鼻中流血不止口噤不開等證針三分留六呼灸三壯委中穴歌委中曲䐐里橫紋脈中央腰痛不能舉酸沉引脊梁風癇及轉筋冬季難移向風痹痛無比熱病久在床足膝難伸屈針入即安康注委中穴其穴在膕中央約紋動脈陷中主治腰脊沉墜疼痛瘈瘲及兩腿肚轉筋疼痛難動風痹疼痛流注不定熱病難愈兩足膝疼痛難伸屈等證針五分溜七呼禁灸承山穴歌承山名魚腹腸分肉間善治腰疼痛痔疾大便難腳氣並膝腫兩足盡寒酸展轉成時疫戰栗瘧熱寒霍亂及轉筋刺之立便安注承山穴其穴在腿肚下尖分肉間主治腰背疼痛痔腫大便難腳氣膝腫脛酸跟痛傷寒時疫寒熱瘧疾戰栗不能行立霍亂轉筋等證針五分灸五壯太衝穴歌太衝足大趾節後二寸中動脈知生死能醫驚癇風咽喉並心腋兩足不能動七疝偏墜腫眼目似云朦亦能療腰痛針下有神功注太衝穴其穴在足大趾本節後二寸陷中動脈應手病者有此脈生無此脈者死主治急慢驚風羊癇風證及咽喉疼痛心腋脹滿寒濕腳氣痛行步難小腹疝氣偏墜疼痛兩目昏暗腰背疼痛等證針三分留十呼灸三壯崑崙穴歌崑崙足外踝跟骨上邊尋轉筋腰尻痛膊重更連陰頭疼脊背急暴喘滿衝心舉步行不得動足即伸吟若欲求安樂須將此穴針注崑崙穴在足外踝後五分跟骨上陷中主治腰尻疼痛膊重不能舉及前陰腫痛偏正頭痛脊背拘急暴咳喘仲足腨腫不得履地等證針三分留七呼灸三壯環跳穴歌環跳在髀樞側臥屈足取能針偏廢軀折腰返顧難冷風並濕痹身體似繩牽腿胯連痛屈轉重吁嘆若人能針灸頃刻病消痊注環跳穴其穴在髀樞中側臥伸下足屈上足取之主治半身不遂閃挫腰痛不能回顧冷風濕痹周身拘急腿胯腿肚疼痛不能動轉等證針一寸留十呼灸三壯陽陵泉穴歌陽陵居膝下外廉一寸中膝腫並麻木冷痹及偏風起坐腰背重面腫滿胸中舉足不能起坐臥似衰翁針入六分止神功妙不同注陽陵泉穴其穴在膝下一尺外廉陷中尖骨前筋骨間主治兩膝腫痛及冷痹不仁半身不遂腰背重痛起坐艱難面目浮腫胸中脹滿兩足疼痛難移起坐不能支持等證針六分留十呼灸七壯通里穴歌通里腕側後去腕一寸中欲言聲不出懊憹及怔忡實則四肢重頭腮面頰紅聲平仍數欠喉痹氣難通虛則不能食暴喑面無容毫針微微刺方信有神功注通里穴其穴在腕側後一寸陷中主治聲啞心煩極甚怔忡不寧四肢重痛頭腮面頰紅腫倦言數欠喉咽疼痛氣息不通虛損不思食暴喑面無潤澤針三分灸三壯列缺穴歌列缺腕側上次指手交叉善療偏頭患遍身風痹麻痰涎頻上壅口噤不開牙若能明補瀉應手即能瘥注列缺穴其穴在腕後側上一寸五分兩手交叉當食指末筋骨罅中主治偏風頭痛遍身風痹麻木痰壅氣堵口噤不開等證針二分留三呼灸三壯四季針灸坐向歌四季針灸坐向理宜從四季順自然東南西北四維向以迎生氣本乎天注針灸坐向避忌之理醫學入門春坐東向西夏坐南向北秋坐西向東冬坐北向南皆背四季生氣之向不可為法宜從春向東夏向南秋向西冬向北四土旺月向四維以迎生氣本乎天理順其自然為是也灸法點穴用火歌點穴坐臥立直正炷用蘄艾火珠良灸病古忌八木火令時通行一炷香注凡灸法坐點穴則坐灸臥點穴則臥灸立點穴則立灸須四體平直毋令傾側若傾側穴即不正其炷所用之艾必用蘄艾艾令乾燥入臼搗去淨塵屑作炷堅實置穴上用蔥涎黏固上古用火珠映日取火點之忌松柏枳橘榆棗桑竹八木之火今時惟用香火灼艾亦通行簡便之法也灸法早晚次序歌灸法溫暖宜於午上下陽陰先後分脈數新愈不宜灸欲灸三里過三旬注凡灸百病原為溫暖經絡宜在午時陽盛之時火氣易行必發上下先後上下經皆灸者先灸上後灸下陰陽經皆灸者先灸陽後灸陰若脈數有熱新愈氣虛俱不宜灸恐傷氣血但人有病欲灸足三里者須年三十以上方許灸之恐年少火盛傷目故凡灸頭必灸足三里者以足三里能下火氣也灸法大小多少歌頭骨手足皮薄瘦巨闕鳩尾小少宜背腹臍下皮肉厚大多方能起痼疾注凡灸諸病必火足氣到始能求愈然頭與四肢皮肉淺薄若並灸之恐肌骨氣血難堪必分日灸之或隔日灸之其炷宜小壯數宜少有病必當灸巨闕鳩尾二穴者必不可過三壯艾炷如小麥恐火氣傷心也背腹下皮肉深厚艾炷宜大壯數宜多使火氣到始能去痼冷之疾也灸法調養歌灸後風寒須謹避七情過極慎起居生冷醇酒諸厚味惟茹蔬淡適其宜注凡灸後須謹避風寒慎其起居養其氣血其喜怒憂思悲恐驚不可過極和其情志及禁食一切生冷醇酒厚味等物即食蔬淡亦當適宜不可過度以調養脾胃也灸瘡調治歌灸瘡不發氣血竭七日發膿病必除發後膏貼防外襲薄連蔥荽淨瘡汙注凡灸諸病灸瘡應發不發是其氣血大虧不必復灸即灸亦多不能愈過七天之後艾疤發時膿水稠多其病易愈以其氣血充暢經絡流通也發後貼膏藥者防其六淫外襲也如灸瘡黑痛膿汁汙穢乃艾火毒盛必用薄荷黃連蔥皮芫荽煎湯洗之自愈也灸瘡膏藥歌芩連白芷金星草乳香淡竹當歸好薄荷川芎與蔥白香油煎藥粉成膏注以上藥味各等分用香油煎藥去滓再下鉛粉熬成膏專貼灸瘡行針避忌歌行針避忌雨大風飢飽醉怒渴勞驚男內女外猶堅守更看人神不可逢行針避忌雖如此還推病之緩急行緩病欲針擇吉日急病行針莫稍停注按行針避忌於未刺之先如風雨晦冥人之氣血即凝滯而不調大飢者氣虛新飽者氣盛大醉者氣亂大怒者氣逆大渴者液少大勞者氣乏大驚者氣散凡此者脈亂氣散行針須當避忌俟其必清必靜聚精會神方保無誤也既刺之後尤當戒慎男子忌內女子忌外忌外者堅拒勿出忌內者謹守勿內則邪氣必去正氣必復是謂得氣理固然矣猶有達變之法存焉緩病須擇神吉急病豈可待時哉四季人神所在禁忌針灸歌四季人神所在處禁忌針灸莫妄施春在左脅秋在右冬在於腰夏在臍注四季人神所在之處謂人之神氣初動之處同乎天之流行也禁針灸者恐傷生氣也人神常在心春在左脅者肝主升也秋在右脅者肺主降也冬在腰者神主藏也夏在臍者脾主化也逐日人神所在禁忌針灸歌一日足大二外踝三日股內四在腰五口六手七內踝八腕九尻十背腰十一鼻柱二髮際三牙四胃五遍身六胸七氣八股內九足二十內踝尋二十一手小二外踝三日肝足四手明五足六胸七在膝八陰九脛晦趺停注足大足之大趾也氣氣衝也手小手之小指也手明手陽明也足足陽明也陰男女前陰中也晦月盡也趺足十趾岐骨也十二時人神所在禁忌針灸歌子踝醜頭寅耳邊卯面辰項巳乳肩午脅未腹申心主酉膝戌腰亥股端注子踝左右內踝外踝也寅耳邊左右兩耳也辰項頸項也巳乳肩兩乳兩肩也午脅左右脅也未腹大腹少腹也申心主胸膈也酉膝左右兩膝也戌腰腰背也亥股兩股內外也禁針穴歌禁針穴道要先明腦戶囟會及神庭絡卻玉枕角孫穴顱息承泣隨承靈神道靈臺膻中忌水分神闕並會陰橫骨氣衝手五里箕門承筋及青靈乳中上三陽絡二十三穴不可針孕婦不宜針合谷三陰交內亦通論石門針灸應須忌女子終身無妊娠外有云門並鳩尾缺盆客主人莫深肩井深時人悶倒三里急補人還平刺中五臟膽皆死衝陽血出投幽冥海泉顴髎乳頭上脊間中髓傴僂形手魚腹陷陰股內膝臏筋會及腎經腋股之下各三寸目眶關節皆通評禁灸穴歌禁灸之穴四十七承光啞門風府逆睛明攢竹下迎香天柱素髎上臨泣腦戶耳門瘈脈通禾髎顴髎絲竹空頭維下關人迎等肩貞大牖心俞同乳中脊中白環俞鳩尾淵液和周榮腹哀少商並魚際經渠天府及中衝陽池陽關地五會漏谷陰陵條口逢殷門申脈承扶忌伏兔髀關連委中陰市下行尋犢鼻諸穴休將艾火攻制針法歌制針須用馬銜鐵惟有金針更可嘉煅煉塗酥插臘肉煮針之藥有多法注制針用馬嚼環鐵者以馬屬午午為火火剋金取剋制之義也若以真金制針用之更佳其煅煉之法將鐵絲於火中煅紅截為二寸或三寸或五寸長短不拘次以蟾酥塗針上入火中微煅取起復照前塗酥煅三次乘熱插入臘肉皮之裡肉之外將後藥用水三碗煎沸次入針肉在內煮至水乾傾於水中待冷將針取出於黃土中插百餘下以去火毒其針要光圓不可用尖鋒次以銅絲纏其柄煮針藥方麝香五分膽礬一錢石斛一錢穿山甲三錢硃砂三錢沒藥三錢川芎三錢細辛三錢甘草節五錢沉香五錢磁石一兩以上諸藥氣味能引入針內
